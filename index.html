<body class="min-h-screen bg-sky-50 text-slate-800">
  <div id="root"></div>

  <script type="text/babel" data-type="module">
    const { useState, useEffect, useRef, useMemo, useCallback } = React;
    const APP_VERSION = '0.04';
    const APP_BUILD = '04/03/2026 - 21h33';
    const PWA_VERSION_ENDPOINT = './version.json';
    const PWA_SW_URL = `./sw.js?v=${encodeURIComponent(`${APP_VERSION}-${APP_BUILD}`)}`;
    const PWA_VERSION_CHECK_INTERVAL_MS = 10 * 60 * 1000;
    const PWA_SW_UPDATE_INTERVAL_MS = 60 * 60 * 1000;

    function versionSignature(version, build) {
      const v = String(version || '').trim();
      const b = String(build || '').trim();
      return `${v}::${b}`;
    }

    async function fetchRemoteVersionMeta(signal) {
      try {
        const res = await fetch(`${PWA_VERSION_ENDPOINT}?t=${Date.now()}`, {
          cache: 'no-store',
          signal,
        });
        if (!res.ok) return null;
        const remote = await res.json();
        const remoteSig = versionSignature(remote?.version, remote?.build);
        const localSig = versionSignature(APP_VERSION, APP_BUILD);
        if (!remoteSig || remoteSig === localSig) return null;
        return remote;
      } catch (_) {
        return null;
      }
    }

    async function initServiceWorkerRuntime({ onUpdateReady, onOfflineReady }) {
      if (!('serviceWorker' in navigator)) {
        return { registration: null, dispose: () => {} };
      }
      let reloading = false;
      const onControllerChange = () => {
        if (reloading) return;
        reloading = true;
        window.location.reload();
      };
      const onMessage = (event) => {
        if (event?.data?.type === 'SUNAPP_SW_OFFLINE_READY') {
          onOfflineReady?.({ source: 'message' });
        }
      };
      navigator.serviceWorker.addEventListener('controllerchange', onControllerChange);
      navigator.serviceWorker.addEventListener('message', onMessage);

      try {
        const registration = await navigator.serviceWorker.register(PWA_SW_URL, { scope: './' });
        window.__sunappSwRegistration = registration;

        const markUpdateReady = (source) => onUpdateReady?.({ source, registration });
        const markOfflineReady = (source) => onOfflineReady?.({ source, registration });

        if (registration.waiting) markUpdateReady('waiting');
        registration.addEventListener('updatefound', () => {
          const installing = registration.installing;
          if (!installing) return;
          installing.addEventListener('statechange', () => {
            if (installing.state !== 'installed') return;
            if (navigator.serviceWorker.controller) markUpdateReady('updatefound');
            else markOfflineReady('installed');
          });
        });
        registration.update().catch(() => {});
        const updateTimer = window.setInterval(() => {
          registration.update().catch(() => {});
        }, PWA_SW_UPDATE_INTERVAL_MS);
        return {
          registration,
          dispose: () => {
            navigator.serviceWorker.removeEventListener('controllerchange', onControllerChange);
            navigator.serviceWorker.removeEventListener('message', onMessage);
            window.clearInterval(updateTimer);
          },
        };
      } catch (_) {
        return {
          registration: null,
          dispose: () => {
            navigator.serviceWorker.removeEventListener('controllerchange', onControllerChange);
            navigator.serviceWorker.removeEventListener('message', onMessage);
          },
        };
      }
    }

    async function activateWaitingServiceWorker() {
      const registration = window.__sunappSwRegistration;
      if (!registration) return false;
      try {
        await registration.update();
      } catch (_) {}
      if (registration.waiting) {
        registration.waiting.postMessage({ type: 'SKIP_WAITING' });
        return true;
      }
      return false;
    }

    // ---------- Utilitaires ----------
    function haversine(lat1, lon1, lat2, lon2) {
      const R = 6371; // km
      const dLat = (lat2 - lat1) * Math.PI / 180;
      const dLon = (lon2 - lon1) * Math.PI / 180;
      const a =
        Math.sin(dLat/2) * Math.sin(dLat/2) +
        Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) *
        Math.sin(dLon/2) * Math.sin(dLon/2);
      const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
      return R * c;
    }

    const SUN_CODES = [0, 1, 2]; // 0=clear, 1=mainly clear, 2=partly cloudy

    // Vent : score 0–100 (même formule que WeatherScore) pour affichage des alertes dans les cartes
    function getWindScoreValue(windKmh) {
      if (windKmh == null) return 100;
      const w = Number(windKmh);
      return w <= 20 ? Math.max(0, 100 - 2 * w) : Math.max(0, 60 - 4 * (w - 20));
    }

    // Score météo 0-5 pour affichage sur les cartes (tag sur l'image)
    const WEATHER_SCORE_CONFIG = [
      { score: 0, emoji: '💩', label: 'Nul', desc: 'Pluie battante, vent violent ou froid polaire. On reste à l\'abri !', badgeClass: 'bg-red-600 text-white' },
      { score: 1, emoji: '⛈️', label: 'Médiocre', desc: 'Grisaille dominante, petit vent frais. Pas l\'idéal pour une sortie.', badgeClass: 'bg-orange-600 text-white' },
      { score: 2, emoji: '⛅', label: 'Passable', desc: 'Quelques éclaircies mais le fond de l\'air reste frais ou instable.', badgeClass: 'bg-amber-600 text-white' },
      { score: 3, emoji: '🌤️', label: 'Agréable', desc: 'Le soleil est là, le vent est calme. Une bonne journée pour s\'aérer !', badgeClass: 'bg-yellow-500 text-slate-900' },
      { score: 4, emoji: '☀️', label: 'Radieux', desc: 'Grand ciel bleu, température idéale. On sort les lunettes de soleil !', badgeClass: 'bg-emerald-500 text-white' },
      { score: 5, emoji: '😎', label: 'Parfait', desc: 'Conditions de carte postale : chaud, sans vent et 100% ensoleillé !', badgeClass: 'bg-green-500 text-white' },
    ];
    const WEATHER_FILTER_LEVELS = [
      { value: 0, label: '🌦️ Tout temps' },
      { value: 1, label: '💩 Médiocre' },
      { value: 2, label: '☁️ Passable' },
      { value: 3, label: '🌤️ Agréable' },
      { value: 4, label: '☀️ Parfait' },
    ];
    const TIME_SCOPE_OPTIONS = [
      { key: 'today', label: "Aujourd'hui" },
      { key: 'tomorrow', label: 'Demain' },
      { key: 'weekend', label: 'Ce week-end' },
    ];
    const WINDOW_START_HOUR = 9;
    const WINDOW_END_HOUR = 19;
    const FORECAST_RELIABILITY_META = {
      high: {
        level: 'high',
        label: 'Fiabilité élevée',
        shortLabel: 'Fiable',
        icon: '🟢',
        className: 'border-emerald-200 bg-emerald-50 text-emerald-700',
      },
      medium: {
        level: 'medium',
        label: 'Fiabilité moyenne',
        shortLabel: 'Moyenne',
        icon: '🟡',
        className: 'border-amber-200 bg-amber-50 text-amber-700',
      },
      low: {
        level: 'low',
        label: 'Fiabilité limitée',
        shortLabel: 'Limitée',
        icon: '🟠',
        className: 'border-orange-200 bg-orange-50 text-orange-700',
      },
    };
    function startOfLocalDay(date) {
      return new Date(date.getFullYear(), date.getMonth(), date.getDate());
    }
    function addLocalDays(date, days) {
      const d = new Date(date);
      d.setDate(d.getDate() + Number(days || 0));
      return d;
    }
    function toLocalDayKey(date) {
      const y = date.getFullYear();
      const m = String(date.getMonth() + 1).padStart(2, '0');
      const d = String(date.getDate()).padStart(2, '0');
      return `${y}-${m}-${d}`;
    }
    function dayOffset(baseDay, targetDay) {
      const ms = startOfLocalDay(targetDay).getTime() - startOfLocalDay(baseDay).getTime();
      return Math.round(ms / (24 * 60 * 60 * 1000));
    }
    function capitalizeFirst(value) {
      const text = String(value || '');
      if (!text) return '';
      return text.charAt(0).toUpperCase() + text.slice(1);
    }
    function formatFrenchDayLabel(date) {
      return capitalizeFirst(new Intl.DateTimeFormat('fr-FR', { weekday: 'long' }).format(date));
    }
    function formatFrenchDateHint(date) {
      return capitalizeFirst(new Intl.DateTimeFormat('fr-FR', { weekday: 'long', day: 'numeric', month: 'long' }).format(date));
    }
    function getForecastReliabilityByOffset(maxOffset) {
      if (maxOffset <= 1) return FORECAST_RELIABILITY_META.high;
      if (maxOffset <= 3) return FORECAST_RELIABILITY_META.medium;
      return FORECAST_RELIABILITY_META.low;
    }
    function buildTimeScopeContext(now = new Date()) {
      const today = startOfLocalDay(now);
      const tomorrow = addLocalDays(today, 1);
      const isoWeekDayIndex = (today.getDay() + 6) % 7; // lundi=0 ... dimanche=6
      const monday = addLocalDays(today, -isoWeekDayIndex);
      const saturday = addLocalDays(monday, 5);
      const sunday = addLocalDays(monday, 6);
      const weekendDays = [saturday, sunday].filter((d) => d.getTime() >= today.getTime());
      const effectiveWeekendDays = weekendDays.length > 0 ? weekendDays : [sunday];
      const makeScope = (key, label, dayDates) => {
        const dayKeys = dayDates.map((d) => toLocalDayKey(d));
        const maxOffset = Math.max(...dayDates.map((d) => dayOffset(today, d)), 0);
        const reliability = getForecastReliabilityByOffset(maxOffset);
        return {
          key,
          label,
          dayDates,
          dayKeys,
          maxOffset,
          reliability,
          dateHint: dayDates.length > 1
            ? dayDates.map((d) => formatFrenchDateHint(d)).join(' + ')
            : formatFrenchDateHint(dayDates[0]),
        };
      };
      const scopes = {
        today: makeScope('today', "Aujourd'hui", [today]),
        tomorrow: makeScope('tomorrow', 'Demain', [tomorrow]),
        weekend: makeScope('weekend', 'Ce week-end', effectiveWeekendDays),
      };
      const maxOffset = Math.max(
        scopes.today.maxOffset,
        scopes.tomorrow.maxOffset,
        scopes.weekend.maxOffset,
        1
      );
      return {
        now,
        today,
        scopes,
        forecastDays: Math.min(7, Math.max(2, maxOffset + 1)),
      };
    }
    function getWeatherFilterLabel(level) {
      return WEATHER_FILTER_LEVELS.find((item) => item.value === level)?.label || '🌦️ Tout temps';
    }
    function getWeatherScore(city) {
      const code = city.weather_code ?? 99;
      const felt = city.feelsLike ?? city.temp ?? 15;
      const wind = city.wind_speed ?? 0;
      const sunny = SUN_CODES.includes(code);
      const rainSnowStorm = [51,53,55,56,57,61,63,65,66,67,71,73,75,77,80,81,82,85,86,95,96,99].includes(code);
      const overcastFog = [3,45,48].includes(code);
      let raw = 2;
      if (rainSnowStorm || felt < 0 || wind > 70) raw = 0;
      else if (overcastFog || felt < 8 || wind > 50) raw = 1;
      else if (sunny && felt >= 22 && wind < 15) raw = 5;
      else if (sunny && felt >= 20 && wind < 30) raw = 4;
      else if (sunny && felt >= 15) raw = 3;
      else if (sunny || code === 2) raw = felt >= 12 ? 3 : 2;
      else raw = felt >= 10 ? 2 : 1;
      if (wind >= 30 && raw > 2) raw = 2;
      const config = WEATHER_SCORE_CONFIG[Math.min(raw, 5)];
      return { ...config, score: raw };
    }

    // Rayon d'action : temps de trajet → rayon approximatif (vitesse moyenne 70 km/h, routes mixtes)
    const TRAVEL_TIME_PRESETS_MIN = [15, 30, 45, 60, 90, 120, 150, 180];
    const AVG_DRIVE_SPEED_KMH = 70;
    function travelTimeToRadiusKm(minutes) {
      return Math.round((minutes / 60) * AVG_DRIVE_SPEED_KMH);
    }
    function formatTravelTime(minutes) {
      if (minutes >= 60) return `${Math.floor(minutes / 60)} h${minutes % 60 ? ` ${minutes % 60} min` : ''}`;
      return `${minutes} min`;
    }

    const FALLBACK_POSITION = { lat: 48.8566, lon: 2.3522 };
    const LAST_POSITION_STORAGE_KEY = 'sunapp:last-position';
    const METEO_RATE_LIMIT_STORAGE_KEY = 'sunapp:meteo-rate-limit-until';
    const METEO_RATE_LIMIT_COOLDOWN_MS = 90 * 1000;
    function loadSavedPosition() {
      try {
        const raw = localStorage.getItem(LAST_POSITION_STORAGE_KEY);
        if (!raw) return null;
        const parsed = JSON.parse(raw);
        const lat = Number(parsed?.lat);
        const lon = Number(parsed?.lon);
        if (!Number.isFinite(lat) || !Number.isFinite(lon)) return null;
        return { lat, lon };
      } catch (_) {
        return null;
      }
    }
    function savePosition(position) {
      try {
        if (!position) return;
        localStorage.setItem(LAST_POSITION_STORAGE_KEY, JSON.stringify({ lat: position.lat, lon: position.lon }));
      } catch (_) {}
    }
    function loadMeteoRateLimitUntil() {
      try {
        const raw = localStorage.getItem(METEO_RATE_LIMIT_STORAGE_KEY);
        const ts = Number(raw);
        if (!Number.isFinite(ts)) return 0;
        return ts;
      } catch (_) {
        return 0;
      }
    }
    function setMeteoRateLimitUntil(ts) {
      try {
        if (!Number.isFinite(Number(ts))) return;
        localStorage.setItem(METEO_RATE_LIMIT_STORAGE_KEY, String(Math.round(Number(ts))));
      } catch (_) {}
    }
    function clearMeteoRateLimitUntil() {
      try {
        localStorage.removeItem(METEO_RATE_LIMIT_STORAGE_KEY);
      } catch (_) {}
    }

    // Température ressentie (refroidissement éolien) — formule Jagger & Osczevski (T °C, V km/h)
    function windChill(T, V) {
      if (T == null || V == null) return T;
      const v = Number(V);
      if (v < 5) return T;
      const v016 = Math.pow(v, 0.16);
      const Rc = 13.12 + 0.6215 * T - 11.37 * v016 + 0.3965 * T * v016;
      return Math.round(Rc * 10) / 10;
    }

    // Score 0–100 pour une tranche horaire (temp, vent km/h, code météo) — même logique que WeatherScore
    function weatherScoreFromSlot(temp, windKmh, weatherCode) {
      const t = temp ?? 20;
      const w = windKmh ?? 10;
      const tempScore = Math.max(0, 100 - 4 * Math.abs(t - 25));
      const windScore = w <= 20 ? Math.max(0, 100 - 2 * w) : Math.max(0, 60 - 4 * (w - 20));
      let score = (tempScore * 0.5) + (windScore * 0.5);
      if (t < 15 && w > 25) score -= 20;
      const isSunny = SUN_CODES.includes(weatherCode ?? -1);
      if (!isSunny) score *= 0.5;
      return Math.max(0, Math.min(100, score));
    }
    // Libellés météo WMO (Open-Meteo) en français
    const WEATHER_LABELS = {
      0: 'Ciel dégagé', 1: 'Plutôt dégagé', 2: 'Partiellement nuageux', 3: 'Couvert',
      45: 'Brouillard', 48: 'Brouillard givrant', 51: 'Bruine légère', 53: 'Bruine', 55: 'Bruine dense',
      56: 'Bruine verglaçante légère', 57: 'Bruine verglaçante dense', 61: 'Pluie légère', 63: 'Pluie modérée', 65: 'Pluie forte',
      66: 'Pluie verglaçante légère', 67: 'Pluie verglaçante forte', 71: 'Neige légère', 73: 'Neige modérée', 75: 'Neige forte',
      77: 'Grains de neige', 80: 'Averses légères', 81: 'Averses modérées', 82: 'Averses violentes',
      85: 'Légères chutes de neige', 86: 'Fortes chutes de neige', 95: 'Orage', 96: 'Orage avec grêle légère', 99: 'Orage avec grêle forte',
    };
    function getWeatherLabel(code) {
      return WEATHER_LABELS[code] != null ? WEATHER_LABELS[code] : '—';
    }

    const PLACE_TYPE_LABELS = { city: 'Ville', town: 'Bourg', village: 'Village', hamlet: 'Hameau', locality: 'Lieu-dit', suburb: 'Agglomération', quarter: 'Quartier', isolated_dwelling: 'Écart', resort: 'Station / Domaine', attraction: 'Site', theme_park: 'Parc', park: 'Parc', nature_reserve: 'Réserve', picnic_site: 'Aire', stadium: 'Stade', pitch: 'Terrain' };
    function getPlaceTypeLabel(type) {
      return PLACE_TYPE_LABELS[type] || type || 'Lieu';
    }

    const MAX_GEO_IMAGE_DISTANCE_M = 10000;
    const MAX_CARD_PHOTOS = 3;
    const MAX_CARD_POIS = 3;
    const MAX_CARD_RESTAURANTS = 3;
    const POI_SEARCH_RADIUS_M = 15000;
    const POI_WIKI_RADIUS_M = 4000;
    const CARD_PHOTO_CACHE = new Map();
    const CARD_POI_CACHE = new Map();
    const CARD_POI_PREVIEW_CACHE = new Map();
    const NON_SCENIC_TITLE_HINTS = /\b(map|carte|plan|logo|flag|drapeau|blason|coat[_ -]?of[_ -]?arms|symbol|diagram|locator|location map|svg|liste de|chronologie|histoire de)\b/i;
    const PERSON_DESCRIPTION_HINTS = /\b(acteur|actrice|chanteur|chanteuse|joueur|joueuse|footballeur|rugbyman|cycliste|peintre|écrivain|politique|député|maire|avocat|journaliste|personnalité|biographie|né en|née en|mort en|morte en|human)\b/i;
    const PLACE_DESCRIPTION_HINTS = /\b(commune|village|hameau|quartier|eglise|chateau|mont|lac|riviere|foret|parc|plage|vallee|reserve|gorges|site naturel|monument|abbaye|cathedrale|basilique|musee|pont|canal|place)\b/i;
    const PLACE_TOKEN_STOPWORDS = new Set(['de', 'du', 'des', 'la', 'le', 'les', 'sur', 'sous', 'saint', 'sainte', 'l', 'd']);

    function getCardPhotoCacheKey(lat, lon) {
      return `${Number(lat).toFixed(4)},${Number(lon).toFixed(4)}`;
    }

    function getCardPoiCacheKey(lat, lon) {
      return `poi:${Number(lat).toFixed(4)},${Number(lon).toFixed(4)}`;
    }

    function getPoiPreviewCacheKey(poi) {
      return [
        poi?.osmType || 'poi',
        poi?.osmId || 0,
        Number(poi?.lat ?? 0).toFixed(5),
        Number(poi?.lon ?? 0).toFixed(5),
        normalizeText(poi?.name || ''),
      ].join(':');
    }

    function normalizeExternalUrl(value) {
      const raw = String(value || '').trim();
      if (!raw) return '';
      if (/^https?:\/\//i.test(raw)) return raw;
      if (/^[a-z0-9.-]+\.[a-z]{2,}(?:[/?#]|$)/i.test(raw)) return `https://${raw}`;
      return '';
    }

    function compactPoiText(value, maxLen = 180) {
      const text = String(value || '').replace(/\s+/g, ' ').trim();
      if (!text) return '';
      return text.length > maxLen ? `${text.slice(0, maxLen - 1)}…` : text;
    }

    function pickFirstTagValue(tags, keys = []) {
      for (const key of keys) {
        const raw = String(tags?.[key] ?? '').trim();
        if (raw) return raw;
      }
      return '';
    }

    function parseRatingToFive(value) {
      const raw = String(value || '').trim();
      if (!raw) return null;
      const normalized = raw.replace(',', '.');
      const fractionMatch = normalized.match(/(\d+(?:\.\d+)?)\s*\/\s*(\d+(?:\.\d+)?)/);
      if (fractionMatch) {
        const num = Number(fractionMatch[1]);
        const den = Number(fractionMatch[2]);
        if (Number.isFinite(num) && Number.isFinite(den) && den > 0) {
          const scaled = (num / den) * 5;
          if (Number.isFinite(scaled) && scaled >= 0 && scaled <= 5) return scaled;
        }
      }
      const numberMatch = normalized.match(/-?\d+(?:\.\d+)?/);
      if (!numberMatch) return null;
      const valueNum = Number(numberMatch[0]);
      if (!Number.isFinite(valueNum)) return null;
      if (valueNum >= 0 && valueNum <= 5) return valueNum;
      if (valueNum > 5 && valueNum <= 100) return valueNum / 20;
      return null;
    }

    function parseReviewCount(value) {
      const raw = String(value || '').trim().toLowerCase();
      if (!raw) return null;
      const kMatch = raw.match(/(\d+(?:[.,]\d+)?)\s*k/);
      if (kMatch) {
        const base = Number(kMatch[1].replace(',', '.'));
        if (Number.isFinite(base) && base > 0) return Math.round(base * 1000);
      }
      const digitsOnly = raw.replace(/[^\d]/g, '');
      if (!digitsOnly) return null;
      const n = Number(digitsOnly);
      return Number.isFinite(n) && n > 0 ? n : null;
    }

    function getRestaurantReviewSnapshot(tags = {}) {
      const ratingSources = [];
      const pushSource = (label, ratingKeys, countKeys) => {
        const rating = parseRatingToFive(pickFirstTagValue(tags, ratingKeys));
        if (!Number.isFinite(rating)) return;
        const count = parseReviewCount(pickFirstTagValue(tags, countKeys));
        const weight = 1 + Math.min(4, Math.log10((count || 20) + 1));
        ratingSources.push({ label, rating, count, weight });
      };

      pushSource(
        'Google',
        ['google:rating', 'google_rating', 'rating:google', 'google_stars'],
        ['google:reviews', 'google_reviews', 'reviews:google', 'rating:google:count']
      );
      pushSource(
        'TripAdvisor',
        ['tripadvisor:rating', 'tripadvisor_rating', 'rating:tripadvisor'],
        ['tripadvisor:reviews', 'tripadvisor_reviews', 'reviews:tripadvisor']
      );
      pushSource(
        'Restaurant Guru',
        ['restaurantguru:rating', 'restaurantguru_rating', 'rating:restaurantguru'],
        ['restaurantguru:reviews', 'restaurantguru_reviews', 'reviews:restaurantguru']
      );

      if (ratingSources.length === 0) {
        return { score100: null, sourceCount: 0, sourceBreakdown: [] };
      }

      const totalWeight = ratingSources.reduce((sum, source) => sum + source.weight, 0) || 1;
      const weightedAverage = ratingSources.reduce((sum, source) => sum + source.rating * source.weight, 0) / totalWeight;
      const clamped = Math.max(0, Math.min(5, weightedAverage));
      const sourceBreakdown = ratingSources
        .map((source) => `${source.label} ${source.rating.toFixed(1)}/5${source.count ? ` (${source.count})` : ''}`)
        .slice(0, 3);
      const sourceCount = ratingSources.length;

      return {
        score100: Math.round(clamped * 20),
        sourceCount,
        sourceBreakdown,
      };
    }

    function parseWikiTitleFromTag(wikiTag) {
      const raw = String(wikiTag || '').trim();
      if (!raw) return '';
      if (/^https?:\/\//i.test(raw)) {
        try {
          const url = new URL(raw);
          const titleFromUrl = decodeURIComponent((url.pathname.split('/').pop() || '').replace(/_/g, ' '));
          return titleFromUrl.trim();
        } catch (_) {
          return '';
        }
      }
      const colonIdx = raw.indexOf(':');
      const token = colonIdx >= 0 ? raw.slice(colonIdx + 1) : raw;
      try {
        return decodeURIComponent(token.replace(/_/g, ' ')).trim();
      } catch (_) {
        return token.replace(/_/g, ' ').trim();
      }
    }

    function getPoiOsmUrl(poi) {
      if (poi?.osmType && poi?.osmId) {
        return `https://www.openstreetmap.org/${poi.osmType}/${poi.osmId}`;
      }
      return `https://www.openstreetmap.org/?mlat=${poi.lat}&mlon=${poi.lon}#map=15/${poi.lat}/${poi.lon}`;
    }

    function getPoiCategory(tags = {}) {
      const amenity = String(tags.amenity || '');
      if (amenity === 'restaurant') return { key: 'restaurant', label: 'Restaurant', emoji: '🍽️' };
      const tourism = String(tags.tourism || '');
      if (tourism === 'viewpoint') return { key: 'viewpoint', label: 'Point de vue', emoji: '🌄' };
      if (tourism === 'museum') return { key: 'museum', label: 'Musée', emoji: '🏛️' };
      if (tourism === 'attraction') return { key: 'attraction', label: 'Site', emoji: '📍' };
      if (['theme_park', 'zoo', 'aquarium'].includes(tourism)) return { key: 'family', label: 'Sortie', emoji: '🎡' };
      const leisure = String(tags.leisure || '');
      if (['park', 'garden', 'nature_reserve'].includes(leisure)) return { key: 'nature', label: 'Nature', emoji: '🌿' };
      if (leisure === 'picnic_site') return { key: 'picnic', label: 'Pause', emoji: '🧺' };
      if (tags.historic) return { key: 'historic', label: 'Patrimoine', emoji: '🏰' };
      const natural = String(tags.natural || '');
      if (['beach', 'peak', 'water', 'wood', 'cliff'].includes(natural)) return { key: 'nature', label: 'Nature', emoji: '🌿' };
      return { key: 'spot', label: 'À découvrir', emoji: '📌' };
    }

    function scorePoiForCity(poi, city) {
      const sunny = SUN_CODES.includes(city?.weather_code ?? -1);
      const wind = Number(city?.wind_speed ?? 0);
      let score = 100 - Math.min(45, (poi.distanceM ?? 0) / 130);
      if (sunny && wind <= 25) {
        if (['viewpoint', 'nature', 'picnic'].includes(poi.categoryKey)) score += 26;
        if (['museum', 'historic'].includes(poi.categoryKey)) score += 8;
      } else {
        if (['museum', 'historic', 'attraction'].includes(poi.categoryKey)) score += 20;
        if (['viewpoint', 'nature', 'picnic'].includes(poi.categoryKey)) score -= 6;
      }
      return score;
    }

    function selectPoiIdeas(rawPois, city, maxItems = MAX_CARD_POIS) {
      if (!Array.isArray(rawPois) || rawPois.length === 0) return [];
      const ranked = rawPois
        .filter((poi) => poi.categoryKey !== 'restaurant')
        .map((poi) => ({ ...poi, _score: scorePoiForCity(poi, city) }))
        .sort((a, b) => (b._score - a._score) || ((a.distanceM ?? Infinity) - (b.distanceM ?? Infinity)));
      const picked = [];
      const usedCategories = new Set();
      const usedNames = new Set();
      for (const poi of ranked) {
        const nameKey = normalizeText(poi.name || '');
        if (!nameKey || usedNames.has(nameKey)) continue;
        if (picked.length >= maxItems) break;
        if (!usedCategories.has(poi.categoryKey)) {
          picked.push(poi);
          usedCategories.add(poi.categoryKey);
          usedNames.add(nameKey);
        }
      }
      if (picked.length < maxItems) {
        for (const poi of ranked) {
          const nameKey = normalizeText(poi.name || '');
          if (!nameKey || usedNames.has(nameKey)) continue;
          picked.push(poi);
          usedNames.add(nameKey);
          if (picked.length >= maxItems) break;
        }
      }
      return picked.slice(0, maxItems);
    }

    function selectRestaurantIdeas(rawPois, maxItems = MAX_CARD_RESTAURANTS) {
      if (!Array.isArray(rawPois) || rawPois.length === 0) return [];
      const restaurants = rawPois
        .filter((poi) => poi.categoryKey === 'restaurant');
      if (restaurants.length === 0) return [];
      const scored = restaurants
        .filter((restaurant) => restaurant.reviewScore100 != null)
        .sort((a, b) => {
          const scoreDiff = Number(b.reviewScore100) - Number(a.reviewScore100);
          if (scoreDiff !== 0) return scoreDiff;
          const sourceDiff = Number(b.reviewSourceCount || 0) - Number(a.reviewSourceCount || 0);
          if (sourceDiff !== 0) return sourceDiff;
          return (a.distanceM ?? Infinity) - (b.distanceM ?? Infinity);
        });
      const unscored = restaurants
        .filter((restaurant) => restaurant.reviewScore100 == null)
        .sort((a, b) => (a.distanceM ?? Infinity) - (b.distanceM ?? Infinity));
      const ranked = [...scored, ...unscored];
      const picked = [];
      const usedNames = new Set();
      for (const restaurant of ranked) {
        const nameKey = normalizeText(restaurant.name || '');
        if (!nameKey || usedNames.has(nameKey)) continue;
        usedNames.add(nameKey);
        picked.push(restaurant);
        if (picked.length >= maxItems) break;
      }
      return picked;
    }

    function normalizeText(input) {
      return (input || '')
        .normalize('NFD')
        .replace(/[\u0300-\u036f]/g, '')
        .toLowerCase();
    }

    function extractPlaceTokens(placeName) {
      const normalized = normalizeText(placeName);
      return normalized
        .split(/[^a-z0-9]+/)
        .filter((token) => token.length >= 4 && !PLACE_TOKEN_STOPWORDS.has(token));
    }

    function hasPlaceTokenMatch(text, placeTokens) {
      if (!placeTokens || placeTokens.length === 0) return false;
      const normalized = normalizeText(text);
      return placeTokens.some((token) => normalized.includes(token));
    }

    async function fetchJson(url, signal) {
      const res = await fetch(url, { signal });
      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      return res.json();
    }

    async function fetchZonePoiIdeas(lat, lon, signal) {
      const query = `[out:json][timeout:18];
(
  nwr(around:${POI_SEARCH_RADIUS_M},${lat},${lon})["amenity"="restaurant"];
  nwr(around:${POI_SEARCH_RADIUS_M},${lat},${lon})["tourism"~"attraction|viewpoint|museum|theme_park|zoo|aquarium"];
  nwr(around:${POI_SEARCH_RADIUS_M},${lat},${lon})["leisure"~"park|garden|nature_reserve|picnic_site"];
  nwr(around:${POI_SEARCH_RADIUS_M},${lat},${lon})["historic"];
  nwr(around:${POI_SEARCH_RADIUS_M},${lat},${lon})["natural"~"beach|peak|water|wood|cliff"];
);
out tags center 120;`;
      const res = await fetch('https://overpass-api.de/api/interpreter', {
        method: 'POST',
        headers: { 'Content-Type': 'application/x-www-form-urlencoded;charset=UTF-8' },
        body: new URLSearchParams({ data: query }),
        signal,
      });
      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      const payload = await res.json();
      const elements = Array.isArray(payload?.elements) ? payload.elements : [];
      const seen = new Set();
      const pois = [];
      for (const el of elements) {
        const tags = el?.tags || {};
        const name = String(tags?.name || '').trim();
        if (!name || name.length < 3) continue;
        const poiLat = Number(el?.lat ?? el?.center?.lat);
        const poiLon = Number(el?.lon ?? el?.center?.lon);
        if (!Number.isFinite(poiLat) || !Number.isFinite(poiLon)) continue;
        const distanceM = Math.round(haversine(lat, lon, poiLat, poiLon) * 1000);
        if (!Number.isFinite(distanceM) || distanceM > POI_SEARCH_RADIUS_M) continue;
        const category = getPoiCategory(tags);
        const dedupeKey = `${normalizeText(name)}|${category.key}`;
        if (seen.has(dedupeKey)) continue;
        seen.add(dedupeKey);
        const reviewSnapshot = category.key === 'restaurant' ? getRestaurantReviewSnapshot(tags) : null;
        pois.push({
          name,
          lat: Number(poiLat.toFixed(5)),
          lon: Number(poiLon.toFixed(5)),
          distanceM,
          osmType: ['node', 'way', 'relation'].includes(el?.type) ? el.type : '',
          osmId: Number.isFinite(Number(el?.id)) ? Number(el.id) : null,
          categoryKey: category.key,
          categoryLabel: category.label,
          emoji: category.emoji,
          reviewScore100: reviewSnapshot?.score100 ?? null,
          reviewSourceCount: reviewSnapshot?.sourceCount ?? 0,
          reviewSourceBreakdown: reviewSnapshot?.sourceBreakdown || [],
          tags: {
            website: String(tags.website || tags.url || tags['contact:website'] || '').trim(),
            opening_hours: String(tags.opening_hours || '').trim(),
            phone: String(tags.phone || tags['contact:phone'] || '').trim(),
            description: String(tags.description || tags.note || '').trim(),
            wikipedia: String(tags.wikipedia || '').trim(),
            amenity: String(tags.amenity || '').trim(),
            cuisine: String(tags.cuisine || '').trim(),
            google_rating: pickFirstTagValue(tags, ['google:rating', 'google_rating', 'rating:google', 'google_stars']),
            google_reviews: pickFirstTagValue(tags, ['google:reviews', 'google_reviews', 'reviews:google', 'rating:google:count']),
            tripadvisor_rating: pickFirstTagValue(tags, ['tripadvisor:rating', 'tripadvisor_rating', 'rating:tripadvisor']),
            tripadvisor_reviews: pickFirstTagValue(tags, ['tripadvisor:reviews', 'tripadvisor_reviews', 'reviews:tripadvisor']),
            restaurantguru_rating: pickFirstTagValue(tags, ['restaurantguru:rating', 'restaurantguru_rating', 'rating:restaurantguru']),
            restaurantguru_reviews: pickFirstTagValue(tags, ['restaurantguru:reviews', 'restaurantguru_reviews', 'reviews:restaurantguru']),
            tourism: String(tags.tourism || '').trim(),
            leisure: String(tags.leisure || '').trim(),
            historic: String(tags.historic || '').trim(),
            natural: String(tags.natural || '').trim(),
          },
        });
      }
      return pois.sort((a, b) => (a.distanceM ?? Infinity) - (b.distanceM ?? Infinity)).slice(0, 40);
    }

    function extractWikiSummaryPage(payload) {
      const pages = Object.values(payload?.query?.pages || {});
      const page = pages[0];
      if (!page || page.missing != null) return null;
      const title = String(page.title || '').trim();
      const summary = compactPoiText(page.extract || '', 320);
      const imageUrl = String(page?.thumbnail?.source || '').trim();
      const wikiUrl = String(page?.fullurl || '').trim() || (title ? `https://fr.wikipedia.org/wiki/${encodeURIComponent(title.replace(/ /g, '_'))}` : '');
      if (!title && !summary && !imageUrl) return null;
      return { title, summary, imageUrl, wikiUrl };
    }

    async function fetchWikiSummaryByTitle(title, signal) {
      const cleanTitle = String(title || '').trim();
      if (!cleanTitle) return null;
      const data = await fetchJson(
        `https://fr.wikipedia.org/w/api.php?action=query&prop=extracts|pageimages|info&inprop=url&exintro=1&explaintext=1&pithumbsize=960&titles=${encodeURIComponent(cleanTitle)}&format=json&origin=*`,
        signal
      );
      return extractWikiSummaryPage(data);
    }

    async function fetchWikiSummaryByPageId(pageId, signal) {
      if (!pageId) return null;
      const data = await fetchJson(
        `https://fr.wikipedia.org/w/api.php?action=query&prop=extracts|pageimages|info&inprop=url&exintro=1&explaintext=1&pithumbsize=960&pageids=${pageId}&format=json&origin=*`,
        signal
      );
      return extractWikiSummaryPage(data);
    }

    async function fetchNearbyWikiSummary(lat, lon, poiName, signal) {
      const nearby = await fetchJson(
        `https://fr.wikipedia.org/w/api.php?action=query&list=geosearch&gscoord=${lat}|${lon}&gsradius=${POI_WIKI_RADIUS_M}&gslimit=8&gsnamespace=0&format=json&origin=*`,
        signal
      );
      const candidates = Array.isArray(nearby?.query?.geosearch) ? nearby.query.geosearch : [];
      if (candidates.length === 0) return null;
      const nameTokens = extractPlaceTokens(poiName || '');
      const best = candidates
        .map((candidate) => {
          const title = candidate?.title || '';
          const dist = Number(candidate?.dist ?? Infinity);
          const titleMatch = hasPlaceTokenMatch(title, nameTokens);
          const score = (titleMatch ? 35 : 0) - Math.min(25, Math.round(dist / 250));
          return { candidate, score };
        })
        .sort((a, b) => (b.score - a.score) || ((a.candidate?.dist ?? Infinity) - (b.candidate?.dist ?? Infinity)))[0];
      if (!best?.candidate?.pageid) return null;
      return fetchWikiSummaryByPageId(best.candidate.pageid, signal);
    }

    async function fetchPoiPreviewDetails(poi, signal) {
      const tags = poi?.tags || {};
      let locality = '';
      try {
        const geoRes = await fetch(
          `https://api-adresse.data.gouv.fr/reverse/?lon=${poi.lon}&lat=${poi.lat}&type=municipality&limit=1`,
          { signal }
        );
        if (geoRes.ok) {
          const geoData = await geoRes.json();
          const props = geoData?.features?.[0]?.properties || {};
          locality = compactPoiText(props.city || props.name || props.label || '', 80);
        }
      } catch (_) {}

      let wiki = null;
      const wikiTitle = parseWikiTitleFromTag(tags.wikipedia);
      if (wikiTitle) {
        try {
          wiki = await fetchWikiSummaryByTitle(wikiTitle, signal);
        } catch (_) {}
      }
      if (!wiki) {
        try {
          wiki = await fetchNearbyWikiSummary(poi.lat, poi.lon, poi.name, signal);
        } catch (_) {}
      }

      const typeHints = [tags.amenity, tags.cuisine, tags.tourism, tags.leisure, tags.historic, tags.natural]
        .map((v) => String(v || '').trim())
        .filter(Boolean)
        .join(' • ');
      const computedReviewSnapshot = poi?.categoryKey === 'restaurant' ? getRestaurantReviewSnapshot(tags) : null;
      const reviewScore100 = poi?.reviewScore100 != null
        ? Number(poi.reviewScore100)
        : (computedReviewSnapshot?.score100 ?? null);
      const reviewSourceBreakdown = Array.isArray(poi?.reviewSourceBreakdown) && poi.reviewSourceBreakdown.length > 0
        ? poi.reviewSourceBreakdown
        : (computedReviewSnapshot?.sourceBreakdown || []);

      return {
        locality,
        summary: wiki?.summary || compactPoiText(tags.description || '', 280),
        imageUrl: wiki?.imageUrl || '',
        wikiUrl: wiki?.wikiUrl || '',
        wikiTitle: wiki?.title || '',
        website: normalizeExternalUrl(tags.website),
        openingHours: compactPoiText(tags.opening_hours || '', 120),
        phone: compactPoiText(tags.phone || '', 60),
        typeHint: compactPoiText(typeHints, 100),
        reviewScore100,
        reviewSourceBreakdown,
        osmUrl: getPoiOsmUrl(poi),
      };
    }

    async function fetchZonePhotoSlides(lat, lon, placeName, signal) {
      const nearbyWiki = await fetchJson(
        `https://fr.wikipedia.org/w/api.php?action=query&list=geosearch&gscoord=${lat}|${lon}&gsradius=${MAX_GEO_IMAGE_DISTANCE_M}&gslimit=30&gsnamespace=0&format=json&origin=*`,
        signal
      );
      const candidates = (nearbyWiki?.query?.geosearch || [])
        .filter((item) => item?.pageid && (item?.dist ?? Infinity) <= MAX_GEO_IMAGE_DISTANCE_M)
        .sort((a, b) => (a.dist ?? 0) - (b.dist ?? 0));
      if (candidates.length === 0) return [];

      const pageIds = candidates.map((item) => item.pageid).join('|');
      const pagesData = await fetchJson(
        `https://fr.wikipedia.org/w/api.php?action=query&prop=pageimages|pageterms&pageids=${pageIds}&pithumbsize=900&wbptterms=description&format=json&origin=*`,
        signal
      );
      const byPageId = new Map(candidates.map((item) => [String(item.pageid), item]));
      const placeTokens = extractPlaceTokens(placeName || '');
      const seenUrls = new Set();

      const rawSlides = Object.values(pagesData?.query?.pages || {})
        .map((page) => {
          const candidate = byPageId.get(String(page?.pageid));
          const imgUrl = page?.thumbnail?.source || null;
          const title = page?.title || candidate?.title || '';
          const description = page?.terms?.description?.[0] || '';
          if (!candidate || !imgUrl || !title) return null;
          if (seenUrls.has(imgUrl)) return null;
          if (NON_SCENIC_TITLE_HINTS.test(title)) return null;
          if (PERSON_DESCRIPTION_HINTS.test(description)) return null;
          const placeMatch = hasPlaceTokenMatch(title, placeTokens) || hasPlaceTokenMatch(description, placeTokens);
          const placeLike = PLACE_DESCRIPTION_HINTS.test(normalizeText(description));
          const veryClose = (candidate.dist ?? Infinity) <= 2500;
          if (!placeMatch && !placeLike && !veryClose) return null;
          seenUrls.add(imgUrl);
          const relevance =
            (placeMatch ? 35 : 0) +
            (placeLike ? 15 : 0) +
            (veryClose ? 10 : 0) -
            Math.min(20, Math.round((candidate.dist ?? 0) / 750));
          return {
            url: imgUrl,
            label: title,
            distanceM: Math.round(candidate.dist || 0),
            source: 'nearby-wiki',
            relevance,
          };
        })
        .filter(Boolean)
        .sort((a, b) => (b.relevance ?? 0) - (a.relevance ?? 0) || (a.distanceM ?? 0) - (b.distanceM ?? 0));

      const topSlides = rawSlides.slice(0, MAX_CARD_PHOTOS);
      if (topSlides.length > 0) return topSlides;

      // Dernier fallback: photos les plus proches avec mini filtre anti hors contexte
      const fallbackSlides = Object.values(pagesData?.query?.pages || {})
        .map((page) => {
          const candidate = byPageId.get(String(page?.pageid));
          const imgUrl = page?.thumbnail?.source || null;
          const title = page?.title || candidate?.title || '';
          const description = page?.terms?.description?.[0] || '';
          if (!candidate || !imgUrl || !title) return null;
          if (NON_SCENIC_TITLE_HINTS.test(title) || PERSON_DESCRIPTION_HINTS.test(description)) return null;
          return {
            url: imgUrl,
            label: title,
            distanceM: Math.round(candidate.dist || 0),
            source: 'nearby-wiki',
          };
        })
        .filter(Boolean)

    function getWeatherIcon(code) {
      if (code === 0) return '☀️';
      if ([1, 2].includes(code)) return '🌤️';
      if (code === 3) return '☁️';
      if ([45, 48].includes(code)) return '🌫️';
      if ([71, 73, 75, 77, 85, 86].includes(code)) return '❄️';
      if ([95, 96, 99].includes(code)) return '⛈️';
      if ([51, 53, 55, 56, 57, 61, 63, 65, 66, 67, 80, 81, 82].includes(code)) return '🌧️';
      return '⛅';
    }

    function precipitationRiskFloorFromCode(code) {
      const c = Number(code);
      if (!Number.isFinite(c)) return 0;
      if ([95, 96, 99].includes(c)) return 90;
      if ([80, 81, 82, 65, 67].includes(c)) return 75;
      if ([61, 63, 66].includes(c)) return 60;
      if ([51, 53, 55, 56, 57].includes(c)) return 45;
      if ([71, 73, 75, 77, 85, 86].includes(c)) return 55;
      if (c === 3) return 15;
      if ([1, 2, 45, 48].includes(c)) return 8;
      return 0;
    }

    function precipitationRiskFromAmount(mm) {
      const m = Number(mm);
      if (!Number.isFinite(m) || m <= 0) return 0;
      if (m >= 5) return 90;
      if (m >= 2) return 75;
      if (m >= 0.8) return 55;
      if (m >= 0.2) return 35;
      return 20;
    }
    function slotPrecipitationRisk(slot) {
      let risk = 0;
      const probability = Number(slot?.precipitationProbability);
      if (Number.isFinite(probability)) {
        risk = Math.max(risk, probability);
      }
      const amount = Number(slot?.precipitationAmount);
      if (Number.isFinite(amount)) {
        risk = Math.max(risk, precipitationRiskFromAmount(amount));
      }
      risk = Math.max(risk, precipitationRiskFloorFromCode(slot?.weatherCode));
      return Math.max(0, Math.min(100, Math.round(risk)));
    }
    function pickSpreadSlots(slots, maxSlots = 5) {
      const list = Array.isArray(slots) ? slots : [];
      if (list.length <= maxSlots) return list.slice();
      const picked = [];
      const used = new Set();
      for (let i = 0; i < maxSlots; i++) {
        const idx = Math.round((i * (list.length - 1)) / Math.max(1, maxSlots - 1));
        if (used.has(idx)) continue;
        used.add(idx);
        picked.push(list[idx]);
      }
      return picked;
    }
    function describeDayMood(daySlots) {
      const slots = Array.isArray(daySlots) ? daySlots : [];
      if (slots.length === 0) return { icon: '❔', label: 'incertain' };
      const avgScore = slots.reduce((sum, slot) => sum + (slot?.score ?? 0), 0) / slots.length;
      const maxRisk = slots.reduce((max, slot) => Math.max(max, slotPrecipitationRisk(slot)), 0);
      const rainySignals = slots.filter((slot) => precipitationRiskFloorFromCode(slot?.weatherCode) >= 45).length;
      const sunnyRatio = slots.filter((slot) => SUN_CODES.includes(slot?.weatherCode)).length / slots.length;
      if (maxRisk >= 65 || rainySignals >= Math.ceil(slots.length * 0.35)) {
        return { icon: '🌧️', label: 'pluvieux' };
      }
      if (avgScore >= 82 || (avgScore >= 74 && sunnyRatio >= 0.7 && maxRisk < 35)) {
        return { icon: '☀️', label: 'parfait' };
      }
      if (avgScore >= 64 && maxRisk < 55) {
        return { icon: '🌤️', label: 'agréable' };
      }
      if (avgScore >= 45) {
        return { icon: '☁️', label: 'passable' };
      }
      return { icon: '💩', label: 'médiocre' };
    }
    function buildScopeForecast(scopeInfo, hourlySlots, currentSlot, nowMs) {
      if (!scopeInfo) return null;
      const dayKeySet = new Set(scopeInfo.dayKeys || []);
      const inScopeDay = (slot) => dayKeySet.has(slot?.dayKey);
      const inScopeWindow = (slot) => {
        if (!inScopeDay(slot)) return false;
        if (!Number.isFinite(slot?.hour)) return false;
        if (slot.hour < WINDOW_START_HOUR || slot.hour > WINDOW_END_HOUR) return false;
        if (scopeInfo.key === 'today' && Number.isFinite(nowMs) && slot.tsMs < nowMs - (30 * 60 * 1000)) return false;
        return true;
      };

      const scopedWindowSlots = (hourlySlots || []).filter(inScopeWindow);
      const scopedDaySlots = (hourlySlots || []).filter((slot) => inScopeDay(slot) && (scopeInfo.key !== 'today' || slot.tsMs >= nowMs - (30 * 60 * 1000)));
      const candidateSlots = scopedWindowSlots.length > 0
        ? scopedWindowSlots
        : (scopedDaySlots.length > 0 ? scopedDaySlots : []);
      const fallbackSlot = currentSlot || null;
      const scoringPool = candidateSlots.length > 0
        ? candidateSlots
        : (fallbackSlot ? [fallbackSlot] : []);
      if (scoringPool.length === 0) return null;

      const bestSlot = scoringPool.reduce((best, slot) => {
        if (!best) return slot;
        if ((slot?.score ?? -Infinity) > (best?.score ?? -Infinity)) return slot;
        if ((slot?.score ?? -Infinity) === (best?.score ?? -Infinity) && (slot?.tsMs ?? Infinity) < (best?.tsMs ?? Infinity)) return slot;
        return best;
      }, null);
      if (!bestSlot) return null;

      const precipSource = scopedWindowSlots.length > 0 ? scopedWindowSlots : scoringPool;
      let precipitationRisk = null;
      if (precipSource.length > 0) {
        const maxRisk = precipSource.reduce((max, slot) => Math.max(max, slotPrecipitationRisk(slot)), 0);
        if (Number.isFinite(maxRisk)) precipitationRisk = Math.round(maxRisk);
      }

      const trendBase = scopeInfo.key === 'weekend'
        ? (scopedWindowSlots.filter((slot) => slot.dayKey === bestSlot.dayKey))
        : scopedWindowSlots;
      const trendSource = trendBase.length > 0
        ? trendBase
        : (candidateSlots.length > 0 ? candidateSlots : [bestSlot]);
      const trendPicked = pickSpreadSlots(trendSource, 5);
      let trendSlots = trendPicked.map((slot) => ({
        label: Number.isFinite(slot?.hour) ? `${slot.hour}h` : '—',
        temp: slot?.temp != null ? Number(slot.temp) : null,
        feelsLike: slot?.feelsLike != null ? Number(slot.feelsLike) : null,
        windKmh: slot?.windKmh != null ? Number(slot.windKmh) : null,
        weatherCode: slot?.weatherCode ?? null,
        score: slot?.score != null ? Number(slot.score) : null,
      }));
      while (trendSlots.length < 5) {
        const last = trendSlots[trendSlots.length - 1];
        if (!last) break;
        trendSlots.push({ ...last });
      }
      if (trendSlots.length === 0) {
        trendSlots = [{
          label: '—',
          temp: bestSlot.temp ?? null,
          feelsLike: bestSlot.feelsLike ?? null,
          windKmh: bestSlot.windKmh ?? null,
          weatherCode: bestSlot.weatherCode ?? null,
          score: bestSlot.score ?? null,
        }];
      }
      const currentScore = trendSlots[0]?.score ?? bestSlot.score ?? 0;
      const avgFuture = trendSlots.length > 1
        ? trendSlots.slice(1).reduce((sum, slot) => sum + (slot.score ?? 0), 0) / (trendSlots.length - 1)
        : currentScore;
      const improvesSoon = scopeInfo.key === 'today' && trendSlots.length > 1 && (avgFuture >= currentScore * 1.2);
      const peakIndex = trendSlots.length > 0
        ? trendSlots.reduce((best, slot, idx) => (slot.score > trendSlots[best].score ? idx : best), 0)
        : 0;
      const showPeak = peakIndex > 0 && trendSlots[peakIndex].score > currentScore + 10;

      const bestDate = Number.isFinite(bestSlot.tsMs) ? new Date(bestSlot.tsMs) : null;
      const bestDayLabel = bestDate ? formatFrenchDayLabel(bestDate) : '';
      const bestHourLabel = Number.isFinite(bestSlot.hour) ? `${bestSlot.hour}h` : '—';
      const bestSlotLabel = scopeInfo.key === 'today'
        ? bestHourLabel
        : `${bestDayLabel} ${bestHourLabel}`.trim();

      let weekendSummary = null;
      let weekendMapSummary = null;
      if (scopeInfo.key === 'weekend') {
        const daySummaries = (scopeInfo.dayDates || []).map((date) => {
          const dayKey = toLocalDayKey(date);
          const daySlots = (hourlySlots || []).filter((slot) => slot.dayKey === dayKey && slot.hour >= WINDOW_START_HOUR && slot.hour <= WINDOW_END_HOUR);
          const mood = describeDayMood(daySlots);
          const dayFull = formatFrenchDayLabel(date);
          const dayShort = String(new Intl.DateTimeFormat('fr-FR', { weekday: 'short' }).format(date)).replace('.', '');
          return {
            full: `${mood.icon} ${dayFull} ${mood.label}`,
            compact: `${mood.icon} ${capitalizeFirst(dayShort)}`,
          };
        });
        weekendSummary = daySummaries.map((d) => d.full).filter(Boolean).join(' / ');
        weekendMapSummary = daySummaries.map((d) => d.compact).filter(Boolean).join(' / ');
      }

      const roundedFeels = bestSlot.feelsLike != null
        ? Math.round(bestSlot.feelsLike)
        : (bestSlot.temp != null ? Math.round(bestSlot.temp) : null);
      const roundedWind = bestSlot.windKmh != null ? Math.round(bestSlot.windKmh) : null;
      const fallbackBadge = `${getWeatherIcon(bestSlot.weatherCode)} ${roundedFeels != null ? `${roundedFeels}°` : '—'} - ${roundedWind != null ? `${roundedWind} kmh` : '— kmh'}`;
      const mapBadgeLabel = weekendMapSummary || fallbackBadge;
      const timeScopeSummary = weekendSummary || bestSlotLabel;

      return {
        temp: bestSlot.temp ?? null,
        feelsLike: bestSlot.feelsLike ?? (bestSlot.temp ?? null),
        weather_code: bestSlot.weatherCode ?? null,
        wind_speed: bestSlot.windKmh ?? null,
        cloud_cover: bestSlot.cloudCover ?? null,
        precipitation_risk: precipitationRisk,
        weatherScore100: Math.round(bestSlot.score ?? 0),
        trendSlots: trendSlots.slice(0, 5),
        hourlyTrend: trendSlots.slice(0, 5).map((slot) => slot.score),
        trendTimes: trendSlots.slice(0, 5).map((slot) => slot.label),
        improvesSoon: !!improvesSoon,
        peakIndex: showPeak ? peakIndex : -1,
        bestSlotLabel,
        mapBadgeLabel,
        weekendSummary,
        timeScopeSummary,
        reliability: scopeInfo.reliability,
        scopeLabel: scopeInfo.label,
        scopeDateHint: scopeInfo.dateHint,
        bestTimestamp: bestSlot.tsMs ?? null,
      };
    }

    // ---------- TrendTimeline : aperçu horaire lisible sur 5 créneaux ----------
    function TrendTimeline({ slots, peakIndex }) {
      if (!slots || slots.length === 0) return null;
      const bestIndex = peakIndex >= 0
        ? peakIndex
        : slots.reduce((best, s, i) => (s.score > slots[best].score ? i : best), 0);
      return (
        <div className="w-full">
          <div className="flex gap-2 overflow-x-auto pb-1 snap-x snap-mandatory">
            {slots.slice(0, 5).map((slot, i) => {
              const isBest = i === bestIndex;
              return (
                <div
                  key={i}
                  className={`min-w-[118px] rounded-xl border p-2.5 snap-start ${isBest ? 'bg-emerald-50 border-emerald-300' : 'bg-slate-50 border-slate-200'}`}
                >
                  <div className="flex items-center justify-between gap-2">
                    <span className="text-[11px] font-semibold text-slate-700">{slot.label || '—'}</span>
                    {isBest && <span className="text-[10px] px-1.5 py-0.5 rounded bg-emerald-500 text-white">Top</span>}
                  </div>
                  <div className="mt-1.5 text-xl leading-none">{getWeatherIcon(slot.weatherCode)}</div>
                  <p className="mt-1 text-[10px] text-slate-500 truncate" title={getWeatherLabel(slot.weatherCode)}>
                    {getWeatherLabel(slot.weatherCode)}
                  </p>
                  <p className="mt-1.5 text-sm font-semibold text-slate-800">
                    {slot.feelsLike != null ? `${Math.round(slot.feelsLike)}°C` : '—'}
                  </p>
                  <p className="text-[10px] text-slate-500">
                    {slot.windKmh != null ? `Vent ${Math.round(slot.windKmh)} km/h` : 'Vent —'}
                  </p>
                  <p className="text-[10px] text-slate-500">
                    Score {slot.score != null ? Math.round(slot.score) : '—'}/100
                  </p>
                </div>
              );
            })}
          </div>
        </div>
      );
    }

    function CityCard({ city, userLat, userLon, onShowOnMap, isRecommended, rank, cardId }) {
      const cardRef = useRef(null);
      const [photoSlides, setPhotoSlides] = useState([]);
      const [photoIndex, setPhotoIndex] = useState(0);
      const [poiRaw, setPoiRaw] = useState([]);
      const [poiLoading, setPoiLoading] = useState(false);
      const [shouldLoadPoi, setShouldLoadPoi] = useState(false);
      const [previewPoi, setPreviewPoi] = useState(null);
      const [previewData, setPreviewData] = useState(null);
      const [previewLoading, setPreviewLoading] = useState(false);
      const [previewError, setPreviewError] = useState('');

      useEffect(() => {
        if (shouldLoadPoi) return;
        const node = cardRef.current;
        if (!node || typeof IntersectionObserver === 'undefined') {
          setShouldLoadPoi(true);
          return;
        }
        const observer = new IntersectionObserver(
          (entries) => {
            if (entries.some((entry) => entry.isIntersecting)) {
              setShouldLoadPoi(true);
              observer.disconnect();
            }
          },
          { rootMargin: '280px 0px' }
        );
        observer.observe(node);
        return () => observer.disconnect();
      }, [shouldLoadPoi]);

      useEffect(() => {
        let cancelled = false;
        const abortController = new AbortController();
        const cacheKey = getCardPhotoCacheKey(city.lat, city.lon);
        const cachedSlides = CARD_PHOTO_CACHE.get(cacheKey);
        if (cachedSlides) {
          setPhotoSlides(cachedSlides);
          setPhotoIndex(0);
          return () => {
            cancelled = true;
            abortController.abort();
          };
        }
        (async () => {
          try {
            const slides = await fetchZonePhotoSlides(city.lat, city.lon, city.name, abortController.signal);
            if (cancelled) return;
            CARD_PHOTO_CACHE.set(cacheKey, slides);
            setPhotoSlides(slides);
            setPhotoIndex(0);
          } catch (err) {
            if (cancelled || err?.name === 'AbortError') return;
            setPhotoSlides([]);
            setPhotoIndex(0);
          }
        })();
        return () => {
          cancelled = true;
          abortController.abort();
        };
      }, [city.lat, city.lon]);

      useEffect(() => {
        if (!shouldLoadPoi) return;
        let cancelled = false;
        const abortController = new AbortController();
        const cacheKey = getCardPoiCacheKey(city.lat, city.lon);
        const cached = CARD_POI_CACHE.get(cacheKey);
        if (cached) {
          setPoiRaw(cached);
          setPoiLoading(false);
          return () => {
            cancelled = true;
            abortController.abort();
          };
        }
        setPoiLoading(true);
        (async () => {
          try {
            const pois = await fetchZonePoiIdeas(city.lat, city.lon, abortController.signal);
            if (cancelled) return;
            CARD_POI_CACHE.set(cacheKey, pois);
            setPoiRaw(pois);
          } catch (err) {
            if (cancelled || err?.name === 'AbortError') return;
            setPoiRaw([]);
          } finally {
            if (!cancelled) setPoiLoading(false);
          }
        })();
        return () => {
          cancelled = true;
          abortController.abort();
        };
      }, [shouldLoadPoi, city.lat, city.lon]);

      useEffect(() => {
        if (!previewPoi) return;
        let cancelled = false;
        const abortController = new AbortController();
        const cacheKey = getPoiPreviewCacheKey(previewPoi);
        const cached = CARD_POI_PREVIEW_CACHE.get(cacheKey);
        if (cached) {
          setPreviewData(cached);
          setPreviewLoading(false);
          setPreviewError('');
          return () => {
            cancelled = true;
            abortController.abort();
          };
        }
        setPreviewLoading(true);
        setPreviewData(null);
        setPreviewError('');
        (async () => {
          try {
            const details = await fetchPoiPreviewDetails(previewPoi, abortController.signal);
            if (cancelled) return;
            CARD_POI_PREVIEW_CACHE.set(cacheKey, details);
            setPreviewData(details);
          } catch (err) {
            if (cancelled || err?.name === 'AbortError') return;
            setPreviewError('Aperçu indisponible pour ce lieu.');
            setPreviewData({ osmUrl: getPoiOsmUrl(previewPoi) });
          } finally {
            if (!cancelled) setPreviewLoading(false);
          }
        })();
        return () => {
          cancelled = true;
          abortController.abort();
        };
      }, [previewPoi]);

      useEffect(() => {
        if (!previewPoi) return;
        const previousOverflow = document.body.style.overflow;
        const onKeyDown = (event) => {
          if (event.key === 'Escape') setPreviewPoi(null);
        };
        document.body.style.overflow = 'hidden';
        window.addEventListener('keydown', onKeyDown);
        return () => {
          document.body.style.overflow = previousOverflow;
          window.removeEventListener('keydown', onKeyDown);
        };
      }, [previewPoi]);

      const dist = haversine(userLat, userLon, city.lat, city.lon);
      const driveMin = Math.round((dist / AVG_DRIVE_SPEED_KMH) * 60);
      const driveLabel = driveMin >= 60 ? `${Math.floor(driveMin / 60)} h` + (driveMin % 60 ? ` ${driveMin % 60} min` : '') : `${driveMin} min`;

        e.stopPropagation();
        if (photoSlides.length <= 1) return;
        setPhotoIndex((prev) => (prev + 1) % photoSlides.length);

      const jumpToPhoto = (e, idx) => {
        e.stopPropagation();
        setPhotoIndex(idx);
      };

      const openPoiPreview = (e, poi) => {
        e.stopPropagation();
        setPreviewData(null);
        setPreviewLoading(true);
        setPreviewError('');
        setPreviewPoi(poi);
      };

      const closePoiPreview = (e) => {
        if (e) e.stopPropagation();
        setPreviewPoi(null);
        setPreviewData(null);
        setPreviewLoading(false);
        setPreviewError('');
      };

      return (
        <div
          id={cardId}
          ref={cardRef}
          className="city-card bg-white rounded-2xl shadow-lg overflow-hidden cursor-pointer border border-slate-100 relative"
          onClick={() => onShowOnMap(city)}
        >

    // ---------- App ----------
    function App() {
      const initialSavedPosition = useMemo(() => loadSavedPosition(), []);
      const [position, setPosition] = useState(initialSavedPosition || FALLBACK_POSITION);
      const [positionSource, setPositionSource] = useState(initialSavedPosition ? 'saved' : 'fallback');
      const [travelTimeIndex, setTravelTimeIndex] = useState(3);
      const [cities, setCities] = useState([]);
      const [timeScope, setTimeScope] = useState('today');
      const [timeScopeContext, setTimeScopeContext] = useState(() => buildTimeScopeContext(new Date()));
      const [loading, setLoading] = useState(false);
      const [error, setError] = useState(null);
      const [requestingGeo, setRequestingGeo] = useState(false);
      const [selectedCity, setSelectedCity] = useState(null);
      const [sortBy, setSortBy] = useState('sunscore');
      const [minTemp, setMinTemp] = useState(15);
      const [maxWindKmh, setMaxWindKmh] = useState(20);
      const [minWeatherLevel, setMinWeatherLevel] = useState(0);
      const [pwaUpdateInfo, setPwaUpdateInfo] = useState(null);
      const [pwaOfflineReady, setPwaOfflineReady] = useState(false);
      const [isApplyingPwaUpdate, setIsApplyingPwaUpdate] = useState(false);
      const [installPromptEvent, setInstallPromptEvent] = useState(null);
      const mapRef = useRef(null);
      const mapInstanceRef = useRef(null);
      const markersRef = useRef([]);
      const circleRef = useRef(null);
      const searchSeqRef = useRef(0);
      const searchAbortRef = useRef(null);

      const travelTimeMin = TRAVEL_TIME_PRESETS_MIN[Math.min(travelTimeIndex, TRAVEL_TIME_PRESETS_MIN.length - 1)];
      const radiusKm = travelTimeToRadiusKm(travelTimeMin);
      const scopeTabs = TIME_SCOPE_OPTIONS.map((option) => ({
        ...option,
        ...(timeScopeContext?.scopes?.[option.key] || {}),
      }));
      const activeScopeInfo = timeScopeContext?.scopes?.[timeScope] || timeScopeContext?.scopes?.today || null;
      const scopedCities = useMemo(() => {
        if (!Array.isArray(cities) || cities.length === 0) return [];
        return cities.map((city) => {
          const timeframes = city?.timeframes || {};
          const fallbackFrame = timeframes.today || timeframes.tomorrow || timeframes.weekend || null;
          const activeFrame = timeframes[timeScope] || fallbackFrame;
          if (!activeFrame) return city;
          return {
            ...city,
            ...activeFrame,
            activeScopeKey: timeScope,
          };
        });
      }, [cities, timeScope]);
      const isFallbackMode = useMemo(
        () => scopedCities.length > 0 && scopedCities.every((city) => !SUN_CODES.includes(city.weather_code)),
        [scopedCities]
      );

      // WeatherScore 0–100 : météo pure (temp 50 %, vent 50 %). Malus ×0,5 si pas ensoleillé/ciel dégagé.
      function weatherScore(city) {
        const t = (city.feelsLike != null ? city.feelsLike : city.temp) ?? 20;
        const w = city.wind_speed != null ? city.wind_speed : 10;
        const tempScore = Math.max(0, 100 - 4 * Math.abs(t - 25));
        // Vent : -2 pts/km/h jusqu'à 20 km/h, puis -4 pts/km/h au-delà
        const windScore = w <= 20
          ? Math.max(0, 100 - 2 * w)
          : Math.max(0, 60 - 4 * (w - 20));
        let score = (tempScore * 0.5) + (windScore * 0.5);
        if (t < 15 && w > 25) score -= 20; // ressenti glacial
        const isSunny = SUN_CODES.includes(city.weather_code ?? -1);
        if (!isSunny) score *= 0.5;
        return Math.max(0, Math.min(100, score));
      }

      const displayedCities = useMemo(() => {
        let list = [...scopedCities];
        if (minTemp > 0) list = list.filter((c) => {
          const t = c.feelsLike != null ? c.feelsLike : c.temp;
          return t != null && t >= minTemp;
        });
        if (maxWindKmh > 0) list = list.filter((c) => c.wind_speed != null && c.wind_speed <= maxWindKmh);
        if (minWeatherLevel > 0) list = list.filter((c) => getWeatherScore(c).score >= minWeatherLevel);
        if (sortBy === 'distance' && position) list.sort((a, b) => haversine(position.lat, position.lon, a.lat, a.lon) - haversine(position.lat, position.lon, b.lat, b.lon));
        else if (sortBy === 'hottest') {
          const felt = (c) => c.feelsLike != null ? c.feelsLike : c.temp ?? -999;
          list.sort((a, b) => {
            const fa = felt(a), fb = felt(b);
            const bandA = Math.round(fa), bandB = Math.round(fb);
            if (bandA !== bandB) return bandB - bandA;
            return fb - fa;
          });
        }
        else if (sortBy === 'calm') list.sort((a, b) => (a.wind_speed ?? 999) - (b.wind_speed ?? 999));
        else if (sortBy === 'clearest') list.sort((a, b) => (a.cloud_cover ?? 999) - (b.cloud_cover ?? 999));
        else if (sortBy === 'sunscore') {
          list.sort((a, b) => {
            const sa = Number.isFinite(Number(a.weatherScore100)) ? Number(a.weatherScore100) : weatherScore(a);
            const sb = Number.isFinite(Number(b.weatherScore100)) ? Number(b.weatherScore100) : weatherScore(b);
            if (sb !== sa) return sb - sa;
            if (!position) return 0;
            return haversine(position.lat, position.lon, a.lat, a.lon) - haversine(position.lat, position.lon, b.lat, b.lon);
          });
        }
        return list;
      }, [scopedCities, sortBy, minTemp, maxWindKmh, minWeatherLevel, position]);

      const scrollToCardByRank = useCallback((rank) => {
        const cardId = `city-card-${rank}`;
        const target = document.getElementById(cardId);
        if (!target) return;
        target.scrollIntoView({ behavior: 'smooth', block: 'start' });
        target.classList.add('city-card-map-focus');
        window.setTimeout(() => target.classList.remove('city-card-map-focus'), 1800);
        try {
          window.history.replaceState(null, '', `#${cardId}`);
        } catch (_) {}
      }, []);

      function generateSearchGrid(lat, lon, radiusKm, baseStepKm = 15, maxPoints = 320) {
        const safeRadiusKm = Math.max(8, Number(radiusKm) || 0);
        const stepKm = Math.max(8, Math.min(baseStepKm, safeRadiusKm / 8));
        const rowStepKm = stepKm * Math.sqrt(3) / 2;
        const jitterKm = Math.min(stepKm * 0.22, 2.4);
        const latFactor = 1 / 111;
        const lonFactor = 1 / (111 * Math.max(Math.cos((lat * Math.PI) / 180), 0.2));
        const dedupePoints = (items) => {
          const out = [];
          const seen = new Set();
          for (const p of items) {
            const key = `${Number(p.lat).toFixed(5)},${Number(p.lon).toFixed(5)}`;
            if (seen.has(key)) continue;
            seen.add(key);
            out.push({ lat: Number(p.lat), lon: Number(p.lon) });
          }
          return out;
        };
        const points = [{ lat: Number(lat.toFixed(5)), lon: Number(lon.toFixed(5)), _distKm: 0, _angle: 0 }];

        let rowIdx = 0;
        for (let yKm = -safeRadiusKm; yKm <= safeRadiusKm; yKm += rowStepKm, rowIdx++) {
          const rowOffsetKm = rowIdx % 2 === 0 ? 0 : stepKm / 2;
          let colIdx = 0;
          for (let xKm = -safeRadiusKm; xKm <= safeRadiusKm; xKm += stepKm, colIdx++) {
            let pxKm = xKm + rowOffsetKm;
            let pyKm = yKm;
            const baseDistKm = Math.hypot(pxKm, pyKm);
            if (baseDistKm > safeRadiusKm) continue;
            if (baseDistKm > 0.001) {
              const seedA = Math.sin((rowIdx + 1) * 12.9898 + (colIdx + 1) * 78.233 + lat * 0.873 + lon * 0.527) * 43758.5453;
              const seedB = Math.sin((rowIdx + 1) * 93.9898 + (colIdx + 1) * 67.345 + lat * 1.137 + lon * 0.261) * 24634.6345;
              const randA = seedA - Math.floor(seedA);
              const randB = seedB - Math.floor(seedB);
              pxKm += (randA - 0.5) * jitterKm * 2;
              pyKm += (randB - 0.5) * jitterKm * 2;
            }
            const distKm = Math.hypot(pxKm, pyKm);
            if (distKm > safeRadiusKm || distKm < stepKm * 0.2) continue;
            const pLat = lat + pyKm * latFactor;
            const pLon = lon + pxKm * lonFactor;
            points.push({
              lat: Number(pLat.toFixed(5)),
              lon: Number(pLon.toFixed(5)),
              _distKm: distKm,
              _angle: Math.atan2(pyKm, pxKm),
            });
          }
        }

        if (points.length <= maxPoints) return dedupePoints(points);

        const center = points[0];
        const others = points.slice(1).sort((a, b) => (a._distKm - b._distKm) || (a._angle - b._angle));
        const rings = Math.max(12, Math.min(40, Math.round(Math.sqrt(maxPoints) * 2)));
        const perRing = Math.max(1, Math.floor((maxPoints - 1) / rings));
        const sampled = [center];

        for (let r = 0; r < rings && sampled.length < maxPoints; r++) {
          const minD = (safeRadiusKm * r) / rings;
          const maxD = (safeRadiusKm * (r + 1)) / rings;
          const ringPoints = others.filter((p) => p._distKm >= minD && (r === rings - 1 ? p._distKm <= maxD : p._distKm < maxD));
          if (ringPoints.length === 0) continue;
          const stride = ringPoints.length / perRing;
          for (let i = 0; i < perRing && sampled.length < maxPoints; i++) {
            sampled.push(ringPoints[Math.floor(i * stride)] || ringPoints[ringPoints.length - 1]);
          }
        }

        if (sampled.length < maxPoints) {
          const used = new Set(sampled.map((p) => `${p.lat},${p.lon}`));
          for (const p of others) {
            const key = `${p.lat},${p.lon}`;
            if (used.has(key)) continue;
            used.add(key);
            sampled.push(p);
            if (sampled.length >= maxPoints) break;
          }
        }

        return dedupePoints(sampled.slice(0, maxPoints));
      }

      async function reverseGeocodeFrBatch(points, signal) {
        const directionLabel = (fromLat, fromLon, toLat, toLon) => {
          const dLon = ((toLon - fromLon) * Math.PI) / 180;
          const y = Math.sin(dLon) * Math.cos((toLat * Math.PI) / 180);
          const x = Math.cos((fromLat * Math.PI) / 180) * Math.sin((toLat * Math.PI) / 180)
            - Math.sin((fromLat * Math.PI) / 180) * Math.cos((toLat * Math.PI) / 180) * Math.cos(dLon);
          const brng = (Math.atan2(y, x) * 180 / Math.PI + 360) % 360;
          const dirs = ['Nord', 'Nord-Est', 'Est', 'Sud-Est', 'Sud', 'Sud-Ouest', 'Ouest', 'Nord-Ouest'];
          return dirs[Math.round(brng / 45) % 8];
        };
        const fallbackLabel = (p, idx) => {
          if (!position) return `Zone meteo ${idx + 1}`;
          const dist = Math.max(1, Math.round(haversine(position.lat, position.lon, p.lat, p.lon)));
          const dir = directionLabel(position.lat, position.lon, p.lat, p.lon);
          return `Zone ${dir} (${dist} km)`;
        };
        const sanitizePlaceLabel = (value) => String(value || '').split(',')[0].replace(/\s+/g, ' ').trim();
        const isGenericSpotLabel = (value) => {
          const label = sanitizePlaceLabel(value);
          return !label || /^spot\b/i.test(label) || /^zone\b/i.test(label);
        };
        const extractLocalityFromAdresseLabel = (value) => {
          const label = String(value || '').replace(/\s+/g, ' ').trim();
          if (!label) return '';
          const commaParts = label.split(',').map((part) => sanitizePlaceLabel(part)).filter(Boolean);
          if (commaParts.length >= 2) {
            const afterComma = commaParts[1].replace(/^\d{5}\s+/, '').trim();
            if (afterComma) return sanitizePlaceLabel(afterComma);
          }
          const postalMatch = label.match(/\b\d{5}\s+([A-Za-zÀ-ÖØ-öø-ÿ' -]+)$/);
          if (postalMatch?.[1]) return sanitizePlaceLabel(postalMatch[1]);
          return '';
        };
        const extractLocalityFromAdresseProps = (props = {}) => {
          const city = sanitizePlaceLabel(props.city || '');
          if (city) return city;
          const type = String(props.type || '').toLowerCase();
          if (['municipality', 'city', 'town', 'village', 'hamlet', 'locality'].includes(type)) {
            const name = sanitizePlaceLabel(props.name || '');
            if (name) return name;
          }
          const fromLabel = extractLocalityFromAdresseLabel(props.label || '');
          if (fromLabel) return fromLabel;
          return '';
        };
        const lookupNearestMunicipalityLabel = async (lat, lon) => {
          const municipalityUrl = `https://api-adresse.data.gouv.fr/reverse/?lon=${lon}&lat=${lat}&type=municipality&limit=1`;
          try {
            const municipalityRes = await fetch(municipalityUrl, { signal });
            if (!municipalityRes.ok) return '';
            const municipalityData = await municipalityRes.json();
            const municipalityProps = municipalityData?.features?.[0]?.properties || {};
            return sanitizePlaceLabel(municipalityProps.city || municipalityProps.name || municipalityProps.label || '');
          } catch (_) {
            return '';
          }
        };
        const lookupNominatimLocality = async (lat, lon) => {
          const url = `https://nominatim.openstreetmap.org/reverse?format=jsonv2&lat=${lat}&lon=${lon}&zoom=10&addressdetails=1&accept-language=fr`;
          try {
            const res = await fetch(url, {
              signal,
              headers: { Accept: 'application/json' },
            });
            if (!res.ok) return '';
            const data = await res.json();
            const address = data?.address || {};
            return sanitizePlaceLabel(
              address.city
              || address.town
              || address.village
              || address.hamlet
              || address.municipality
              || address.suburb
              || address.county
              || address.state_district
              || ''
            );
          } catch (_) {
            return '';
          }
        };
        const lookupOne = async (p, idx) => {
          let nextLat = p.lat;
          let nextLon = p.lon;
          let firstFeature = null;
          let features = [];
          try {
            const url = `https://api-adresse.data.gouv.fr/reverse/?lon=${p.lon}&lat=${p.lat}&limit=5`;
            const res = await fetch(url, { signal });
            if (res.ok) {
              const data = await res.json();
              features = Array.isArray(data?.features) ? data.features : [];
              firstFeature = features[0] || null;
            }
            const coords = firstFeature?.geometry?.coordinates;
            if (Array.isArray(coords) && coords.length >= 2) {
              const snappedLon = Number(coords[0]);
              const snappedLat = Number(coords[1]);
              if (Number.isFinite(snappedLat) && Number.isFinite(snappedLon)) {
                const snapDistKm = haversine(p.lat, p.lon, snappedLat, snappedLon);
                if (snapDistKm <= Math.min(7, radiusKm * 0.2 + 1)) {
                  nextLat = snappedLat;
                  nextLon = snappedLon;
                }
              }
            }
          } catch (_) {}

          let label = '';
          for (const feat of features) {
            const props = feat?.properties || {};
            const candidate = extractLocalityFromAdresseProps(props);
            if (!isGenericSpotLabel(candidate)) {
              label = candidate;
              break;
            }
          }
          if (isGenericSpotLabel(label)) {
            const nearestMunicipality = await lookupNearestMunicipalityLabel(nextLat, nextLon);
            if (nearestMunicipality) label = nearestMunicipality;
          }
          if (isGenericSpotLabel(label)) {
            const nominatimLocality = await lookupNominatimLocality(nextLat, nextLon);
            if (nominatimLocality) label = nominatimLocality;
          }
          if (isGenericSpotLabel(label)) label = fallbackLabel(p, idx);

          return {
            ...p,
            lat: Number(nextLat.toFixed(5)),
            lon: Number(nextLon.toFixed(5)),
            _dist: position ? haversine(position.lat, position.lon, nextLat, nextLon) : p._dist,
            name: label,
            type: firstFeature?.properties?.type || 'zone',
          };
        };
        const out = [];
        for (let i = 0; i < points.length; i++) {
          const item = await lookupOne(points[i], i);
          out.push(item);
        }
        const named = out.filter((p) => !isGenericSpotLabel(p?.name));
        if (named.length > 0) {
          for (const item of out) {
            if (!item || !isGenericSpotLabel(item.name)) continue;
            let nearest = null;
            let nearestDist = Infinity;
            for (const candidate of named) {
              const d = haversine(item.lat, item.lon, candidate.lat, candidate.lon);
              if (d < nearestDist) {
                nearestDist = d;
                nearest = candidate;
              }
            }
            const replacementRadiusKm = Math.max(30, Math.min(120, radiusKm * 0.8));
            if (nearest && nearestDist <= replacementRadiusKm) {
              item.name = nearest.name;
            }
          }
        }
        return out;
      }

      const requestUserGeolocation = useCallback(() => {
        if (!navigator.geolocation) {
          setError('La géolocalisation n\'est pas supportée. Utilisation d\'une position de secours.');
          return;
        }
        if (!window.isSecureContext && location.hostname !== 'localhost' && location.hostname !== '127.0.0.1') {
          setError('Sur Safari mobile, la géolocalisation exige HTTPS. Utilisation de la position de secours.');
          return;
        }
        setRequestingGeo(true);
        navigator.geolocation.getCurrentPosition(
          (pos) => {
            const nextPos = { lat: pos.coords.latitude, lon: pos.coords.longitude };
            setPosition(nextPos);
            setPositionSource('geo');
            savePosition(nextPos);
            setError(null);
            setRequestingGeo(false);
          },
          (err) => {
            const messages = {
              1: 'Accès à la position refusé. Vous pouvez continuer avec la position de secours.',
              2: 'Position indisponible. Vérifiez la connexion/GPS ou continuez sans géolocalisation.',
              3: 'Délai de géolocalisation dépassé. Réessayez avec le bouton.',
            };
            setError(messages[err.code] || 'Erreur de géolocalisation. Utilisation de la position de secours.');
            setRequestingGeo(false);
          },
          { enableHighAccuracy: true, timeout: 15000, maximumAge: 60000 }
        );
      }, []);

      // Tentative initiale (non bloquante), puis bouton manuel possible
      useEffect(() => {
        requestUserGeolocation();
      }, [requestUserGeolocation]);

      const installPwa = useCallback(async () => {
        if (!installPromptEvent) return;
        try {
          installPromptEvent.prompt();
          await installPromptEvent.userChoice;
        } catch (_) {
          // no-op
        } finally {
          setInstallPromptEvent(null);
        }
      }, [installPromptEvent]);

      const applyPwaUpdate = useCallback(async () => {
        setIsApplyingPwaUpdate(true);
        try {
          const switched = await activateWaitingServiceWorker();
          if (!switched) window.location.reload();
        } catch (_) {
          window.location.reload();
        }
      }, []);

      useEffect(() => {
        const onBeforeInstallPrompt = (event) => {
          event.preventDefault();
          setInstallPromptEvent(event);
        };
        const onInstalled = () => {
          setInstallPromptEvent(null);
        };
        window.addEventListener('beforeinstallprompt', onBeforeInstallPrompt);
        window.addEventListener('appinstalled', onInstalled);
        return () => {
          window.removeEventListener('beforeinstallprompt', onBeforeInstallPrompt);
          window.removeEventListener('appinstalled', onInstalled);
        };
