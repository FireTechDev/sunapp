      useEffect(() => {
        let cancelled = false;
        let disposeSw = () => {};
        let versionTimer = null;

        const checkVersion = async () => {
          const remote = await fetchRemoteVersionMeta();
          if (cancelled || !remote) return;
          setPwaUpdateInfo({
            source: 'version',
            version: remote.version || null,
            build: remote.build || null,
            updatedAt: remote.updatedAt || null,
          });
        };

        (async () => {
          const swRuntime = await initServiceWorkerRuntime({
            onUpdateReady: () => {
              if (cancelled) return;
              setPwaUpdateInfo((prev) => prev || { source: 'sw' });
            },
            onOfflineReady: () => {
              if (cancelled) return;
              setPwaOfflineReady(true);
            },
          });
          if (cancelled) {
            swRuntime.dispose?.();
            return;
          }
          disposeSw = swRuntime.dispose || (() => {});
        })();

        checkVersion();
        versionTimer = window.setInterval(checkVersion, PWA_VERSION_CHECK_INTERVAL_MS);
        return () => {
          cancelled = true;
          disposeSw();
          if (versionTimer) window.clearInterval(versionTimer);
        };
      }, []);

      // Recherche météo par maillage (grille dans le rayon) + Open-Meteo batch + API Géo
      async function runSearch() {
        if (!position) return;
        const searchSeq = searchSeqRef.current + 1;
        searchSeqRef.current = searchSeq;
        if (searchAbortRef.current) searchAbortRef.current.abort();
        const abortController = new AbortController();
        searchAbortRef.current = abortController;
        const { signal } = abortController;
        const isCurrentSearch = () => searchSeqRef.current === searchSeq;
        const finishIfCurrent = () => {
          if (!isCurrentSearch()) return;
          searchAbortRef.current = null;
          setLoading(false);
        };

        const nowTs = Date.now();
        const rateLimitUntil = loadMeteoRateLimitUntil();
        if (rateLimitUntil > nowTs) {
          const waitSec = Math.max(1, Math.ceil((rateLimitUntil - nowTs) / 1000));
          setError(`Limite API météo atteinte. Nouvelle tentative dans ${waitSec}s.`);
          finishIfCurrent();
          return;
        }

        setLoading(true);
        setError(null);
        setCities([]);
        const runtimeScopeContext = buildTimeScopeContext(new Date());
        setTimeScopeContext(runtimeScopeContext);

        const gridMaxPoints = radiusKm >= 140 ? 180 : radiusKm >= 80 ? 160 : 140;
        const grid = generateSearchGrid(position.lat, position.lon, radiusKm, 15, gridMaxPoints);
        if (grid.length === 0) {
          setError('Aucun point de recherche disponible. Élargissez le rayon.');
          finishIfCurrent();
          return;
        }

        function mergeMeteo(points, results) {
          const list = Array.isArray(results) ? results : [results];
          const nowMs = runtimeScopeContext.now.getTime();
          return points.map((p, i) => {
            const r = list[i];
            const cur = r?.current || {};
            // Si données météo incomplètes, on ignore ce point (pas de fallback arbitraire)
            if (cur.temperature_2m == null || cur.wind_speed_10m == null || cur.weather_code == null) return null;
            const hourly = r?.hourly || {};
            const times = hourly.time || [];
            const temps = hourly.temperature_2m || [];
            const winds = hourly.wind_speed_10m || [];
            const codes = hourly.weather_code || [];
            const precipProbabilities = hourly.precipitation_probability || [];
            const precipAmounts = hourly.precipitation || [];
            const clouds = hourly.cloud_cover || [];
            const temp = Number(cur.temperature_2m);
            const wind = Number(cur.wind_speed_10m);
            const currentSlot = {
              tsMs: nowMs,
              dayKey: toLocalDayKey(runtimeScopeContext.now),
              hour: runtimeScopeContext.now.getHours(),
              temp: Number.isFinite(temp) ? temp : null,
              windKmh: Number.isFinite(wind) ? wind : null,
              feelsLike: windChill(temp, wind),
              weatherCode: Number(cur.weather_code),
              precipitationProbability: null,
              precipitationAmount: null,
              cloudCover: Number.isFinite(Number(cur.cloud_cover)) ? Number(cur.cloud_cover) : null,
              score: weatherScoreFromSlot(windChill(temp, wind) ?? temp, wind, Number(cur.weather_code)),
            };
            const hourlySlots = [];
            const maxLen = Math.max(times.length, temps.length, winds.length, codes.length);
            for (let tIdx = 0; tIdx < maxLen; tIdx++) {
              const ts = new Date(times[tIdx]);
              const tsMs = ts.getTime();
              if (!Number.isFinite(tsMs)) continue;
              const t = Number(temps[tIdx]);
              const w = Number(winds[tIdx]);
              const code = Number(codes[tIdx]);
              if (!Number.isFinite(t) || !Number.isFinite(w) || !Number.isFinite(code)) continue;
              const feelsLike = windChill(t, w);
              const probability = Number(precipProbabilities[tIdx]);
              const amount = Number(precipAmounts[tIdx]);
              const cloudCover = Number(clouds[tIdx]);
              hourlySlots.push({
                tsMs,
                dayKey: toLocalDayKey(ts),
                hour: ts.getHours(),
                temp: t,
                windKmh: w,
                feelsLike: feelsLike != null ? feelsLike : t,
                weatherCode: code,
                precipitationProbability: Number.isFinite(probability) ? probability : null,
                precipitationAmount: Number.isFinite(amount) ? amount : null,
                cloudCover: Number.isFinite(cloudCover) ? cloudCover : null,
                score: weatherScoreFromSlot(feelsLike ?? t, w, code),
              });
            }
            hourlySlots.sort((a, b) => a.tsMs - b.tsMs);
            const timeframes = {};
            for (const option of TIME_SCOPE_OPTIONS) {
              const info = runtimeScopeContext?.scopes?.[option.key];
              const scoped = buildScopeForecast(info, hourlySlots, currentSlot, nowMs);
              if (scoped) {
                timeframes[option.key] = scoped;
              }
            }
            const baseFrame = timeframes.today || timeframes.tomorrow || timeframes.weekend;
            if (!baseFrame) return null;
            const selectionScore = Object.values(timeframes)
              .map((frame) => Number(frame?.weatherScore100))
              .filter((value) => Number.isFinite(value))
              .reduce((max, value) => Math.max(max, value), Number(baseFrame.weatherScore100) || 0);

            return {
              id: `grid-${i}`,
              name: `Zone ${i + 1}`,
              type: 'zone',
              ...p,
              ...baseFrame,
              timeframes,
              _dist: haversine(position.lat, position.lon, p.lat, p.lon),
              _selectionScore: selectionScore,
            };
          }).filter(Boolean);
        }

        try {
          const baseUrl = 'https://api.open-meteo.com/v1/forecast';
          const forecastDays = runtimeScopeContext?.forecastDays || 2;
          const params = `current=temperature_2m,weather_code,wind_speed_10m,cloud_cover&hourly=temperature_2m,weather_code,wind_speed_10m,cloud_cover,precipitation_probability,precipitation&forecast_days=${forecastDays}&timezone=auto`;
          const METEO_BATCH_SIZE = 48;
          const METEO_MIN_BATCH_SIZE = 12;
          const METEO_CHUNK_DELAY_MS = 280;
          const waitWithSignal = (ms) => new Promise((resolve, reject) => {
            const timer = window.setTimeout(resolve, ms);
            const onAbort = () => {
              window.clearTimeout(timer);
              reject(new DOMException('Aborted', 'AbortError'));
            };
            signal.addEventListener('abort', onAbort, { once: true });
          });
          const fetchMeteoBatch = async (pts) => {
            const latStr = pts.map((p) => p.lat).join(',');
            const lonStr = pts.map((p) => p.lon).join(',');
            const url = `${baseUrl}?latitude=${latStr}&longitude=${lonStr}&${params}`;
            const meteoRes = await fetch(url, { signal });
            if (!meteoRes.ok) {
              const err = new Error(meteoRes.status === 429
                ? 'Limite API météo atteinte (429). Réessayez dans 1 minute.'
                : 'Service météo indisponible. Réessayez.'
              );
              err.status = meteoRes.status;
              if (meteoRes.status === 429) {
                const retryAfterRaw = meteoRes.headers.get('retry-after');
                const retryAfterSec = Number(retryAfterRaw);
                const retryAfterMs = Number.isFinite(retryAfterSec) && retryAfterSec > 0
                  ? retryAfterSec * 1000
                  : METEO_RATE_LIMIT_COOLDOWN_MS;
                err.retryAfterMs = Math.max(METEO_RATE_LIMIT_COOLDOWN_MS, Math.min(5 * 60 * 1000, retryAfterMs));
              }
              throw err;
            }
            return meteoRes.json();
          };
          const fetchAndScoreChunk = async (pts, depth = 0) => {
            if (!pts || pts.length === 0) return [];
            try {
              const data = await fetchMeteoBatch(pts);
              return mergeMeteo(pts, data);
            } catch (err) {
              if (err?.name === 'AbortError') throw err;
              if (Number(err?.status) === 429) throw err;
              if (pts.length <= METEO_MIN_BATCH_SIZE) return [];
              if (depth >= 2) return [];
              const mid = Math.ceil(pts.length / 2);
              const left = await fetchAndScoreChunk(pts.slice(0, mid), depth + 1);
              const right = await fetchAndScoreChunk(pts.slice(mid), depth + 1);
              return [...left, ...right];
            }
          };

          let scored = [];
          let meteoRowId = 0;
          let rateLimited = false;
          for (let i = 0; i < grid.length; i += METEO_BATCH_SIZE) {
            if (!isCurrentSearch()) return;
            if (i > 0) await waitWithSignal(METEO_CHUNK_DELAY_MS);
            const chunk = grid.slice(i, i + METEO_BATCH_SIZE);
            try {
              const partialScored = await fetchAndScoreChunk(chunk);
              for (const row of partialScored) {
                scored.push({ ...row, id: `grid-${meteoRowId++}` });
              }
            } catch (err) {
              if (err?.name === 'AbortError') throw err;
              if (Number(err?.status) === 429) {
                const retryAfterMs = Number(err?.retryAfterMs);
                const cooldownMs = Number.isFinite(retryAfterMs) && retryAfterMs > 0 ? retryAfterMs : METEO_RATE_LIMIT_COOLDOWN_MS;
                setMeteoRateLimitUntil(Date.now() + cooldownMs);
                rateLimited = true;
                break;
              }
            }
          }
          if (rateLimited && scored.length < 10) {
            const cooldownUntil = loadMeteoRateLimitUntil();
            const waitSec = cooldownUntil > Date.now()
              ? Math.max(1, Math.ceil((cooldownUntil - Date.now()) / 1000))
              : 60;
            throw new Error(`Limite API météo atteinte (429). Réessayez dans ${waitSec}s.`);
          }
          if (scored.length === 0) throw new Error('Aucune donnée météo exploitable dans le rayon.');
          if (!rateLimited) clearMeteoRateLimitUntil();
          const byScoreThenDist = (a, b) => {
            const sDiff = (b._selectionScore ?? b.weatherScore100 ?? 0) - (a._selectionScore ?? a.weatherScore100 ?? 0);
            if (sDiff !== 0) return sDiff;
            return (a._dist ?? 0) - (b._dist ?? 0);
          };
          const pickTopWithDistanceSpread = (list, n = 20) => {
            const rings = 5;
            const perRing = Math.max(1, Math.floor(n / rings));
            const picked = [];
            const used = new Set();
            const maxD = Math.max(radiusKm, 1);
            for (let r = 0; r < rings; r++) {
              const minD = (maxD * r) / rings;
              const maxRingD = (maxD * (r + 1)) / rings;
              const ringItems = list
                .filter((p) => (p._dist ?? 0) >= minD && (r === rings - 1 ? (p._dist ?? 0) <= maxRingD : (p._dist ?? 0) < maxRingD))
                .sort(byScoreThenDist);
              for (let i = 0; i < ringItems.length && i < perRing; i++) {
                if (picked.length >= n) break;
                const p = ringItems[i];
                if (used.has(p.id)) continue;
                picked.push(p);
                used.add(p.id);
              }
            }
            if (picked.length < n) {
              for (const p of [...list].sort(byScoreThenDist)) {
                if (picked.length >= n) break;
                if (used.has(p.id)) continue;
                picked.push(p);
                used.add(p.id);
              }
            }
            return picked;
          };
          const top20 = pickTopWithDistanceSpread(scored, 20);
          const namedTop20 = await reverseGeocodeFrBatch(top20, signal);
          const finalList = namedTop20
            .map((p, i) => ({ ...p, id: p.id || `zone-${i}` }))
            .sort(byScoreThenDist);
          if (!isCurrentSearch()) return;
          setCities(finalList);
          finishIfCurrent();
        } catch (err) {
          if (err?.name === 'AbortError' || !isCurrentSearch()) return;
          setError(err.message || 'Recherche météo indisponible. Réessayez.');
          setCities([]);
          finishIfCurrent();
        }
      }

      useEffect(() => {
        return () => {
          if (searchAbortRef.current) searchAbortRef.current.abort();
        };
      }, []);

      // Carte Leaflet + cercle du rayon de recherche
      useEffect(() => {
        if (!position || !mapRef.current) return;
        if (mapInstanceRef.current) {
          mapInstanceRef.current.remove();
          markersRef.current = [];
          circleRef.current = null;
        }
        const map = L.map(mapRef.current).setView([position.lat, position.lon], 8);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
          attribution: '© OpenStreetMap',
        }).addTo(map);
        const userMarkerLabel = positionSource === 'geo' ? 'Vous êtes ici' : 'Position utilisée (sans GPS)';
        L.marker([position.lat, position.lon]).addTo(map).bindPopup(userMarkerLabel);
        const circle = L.circle([position.lat, position.lon], {
          radius: radiusKm * 1000,
          color: '#1e40af',
          fillColor: '#36A7EB',
          fillOpacity: 0.2,
          weight: 2,
        }).addTo(map);
        circleRef.current = circle;
        mapInstanceRef.current = map;
        return () => {
          if (mapInstanceRef.current) {
            mapInstanceRef.current.remove();
            mapInstanceRef.current = null;
          }
          circleRef.current = null;
        };
      }, [position, positionSource]);

      useEffect(() => {
        if (circleRef.current && mapInstanceRef.current) {
          circleRef.current.setRadius(radiusKm * 1000);
        }
      }, [radiusKm]);

      useEffect(() => {
        if (!mapInstanceRef.current) return;
        markersRef.current.forEach((m) => m.remove());
        markersRef.current = [];
        if (displayedCities.length === 0) return;
        displayedCities.forEach((city, idx) => {
          const rank = idx + 1;
          const score5 = getWeatherScore(city).score;
          const fill = score5 >= 5 ? '#f97316' : score5 >= 4 ? '#fb923c' : score5 >= 3 ? '#f59e0b' : score5 >= 2 ? '#facc15' : '#9ca3af';
          const pointSize = Math.max(22, Math.round(12 + score5 * 2.8));
          const roundedFeels = city.feelsLike != null
            ? Math.round(city.feelsLike)
            : (city.temp != null ? Math.round(city.temp) : null);
          const roundedWind = city.wind_speed != null ? Math.round(city.wind_speed) : null;
          const mapBadgeLabel = city.mapBadgeLabel || `${getWeatherIcon(city.weather_code)} ${roundedFeels != null ? `${roundedFeels}°` : '—'} - ${roundedWind != null ? `${roundedWind} kmh` : '— kmh'}`;
          const popupTempLabel = roundedFeels != null ? ` • ressenti ${roundedFeels}°` : '';
          const popupScopeLabel = city.weekendSummary
            ? ` • ${city.weekendSummary}`
            : (city.bestSlotLabel ? ` • ${(city.scopeLabel ? `${city.scopeLabel} ` : '')}${city.bestSlotLabel}` : '');
          const m = L.marker([city.lat, city.lon], {
            icon: L.divIcon({
              className: 'sunapp-map-point-icon',
              html: `<div class="sunapp-map-point-number" style="--sunapp-point-size:${pointSize}px;--sunapp-point-color:${fill};">${rank}</div>`,
              iconSize: [pointSize, pointSize],
              iconAnchor: [pointSize / 2, pointSize / 2],
            }),
            keyboard: true,
            title: `${rank}. ${city.name}`,
          })
            .addTo(mapInstanceRef.current)
            .bindTooltip(mapBadgeLabel, {
              permanent: true,
              direction: 'top',
              offset: [0, -(pointSize * 0.8)],
              className: 'sunapp-map-badge',
              opacity: 1,
            })
            .bindPopup(`${rank}. ${city.name} — ${score5}/5${popupTempLabel}${popupScopeLabel}`);
          m.on('click', () => {
            setSelectedCity(city);
            scrollToCardByRank(rank);
          });
          markersRef.current.push(m);
        });
      }, [displayedCities, scrollToCardByRank]);

      useEffect(() => {
        if (!selectedCity || !mapInstanceRef.current) return;
        mapInstanceRef.current.setView([selectedCity.lat, selectedCity.lon], 10);
      }, [selectedCity]);

      const weatherLevelLabel = minWeatherLevel > 0
        ? `${getWeatherFilterLabel(minWeatherLevel)} ou mieux`
        : getWeatherFilterLabel(0);

      const locationTitle = positionSource === 'geo'
        ? 'chez vous'
        : positionSource === 'saved'
          ? 'votre dernière position enregistrée'
          : 'une position de secours (Paris)';
      const isSecureGeoContext = window.isSecureContext || location.hostname === 'localhost' || location.hostname === '127.0.0.1';
      const geoBannerText = positionSource === 'geo'
        ? 'Position GPS active.'
        : positionSource === 'saved'
          ? 'GPS non disponible: dernière position enregistrée utilisée.'
          : 'GPS non disponible: position de secours utilisée.';
      const destinationLabel = scopedCities.length === 1 ? '1 zone trouvée' : `${scopedCities.length} zones trouvées`;

      return (
        <div className="min-h-screen p-4 md:p-6 bg-sky-50">
          <header className="mb-6">
            <h1 className="text-2xl font-bold text-slate-800 flex items-center gap-2">
              <IconSun className="text-amber-500" /> SunApp
            </h1>
            <div className="mt-3 bg-white border border-slate-100 rounded-2xl p-3 shadow-sm">
              <p className="text-xs uppercase tracking-wide text-slate-500 font-semibold mb-2">Quand ?</p>
              <div className="grid grid-cols-3 gap-2">
                {scopeTabs.map((tab) => {
                  const isActive = tab.key === timeScope;
                  return (
                    <button
                      key={tab.key}
                      type="button"
                      onClick={() => setTimeScope(tab.key)}
                      className={`rounded-xl px-3 py-2.5 text-sm font-semibold border transition ${isActive ? 'bg-sky-500 text-white border-sky-500 shadow-sm' : 'bg-white text-slate-700 border-slate-200 hover:bg-slate-50'}`}
                    >
                      {tab.label}
                    </button>
                  );
                })}
              </div>
              <div className="mt-2 flex flex-wrap items-center gap-2 text-xs">
                <span className="text-slate-600">
                  {activeScopeInfo?.dateHint || ''}
                </span>
              </div>
            </div>
          </header>

          {pwaUpdateInfo && (
            <div className="mb-4 bg-amber-50 border border-amber-200 rounded-2xl p-4 flex flex-wrap items-center justify-between gap-3">
              <div className="text-amber-900">
                <p className="text-sm font-semibold">Nouvelle version disponible.</p>
                <p className="text-xs text-amber-800 mt-1">
                  {pwaUpdateInfo.version || pwaUpdateInfo.build
                    ? `Version ${pwaUpdateInfo.version || 'n/a'} • Build ${pwaUpdateInfo.build || 'n/a'}`
                    : 'Rechargez l’application pour activer la mise à jour.'}
                </p>
              </div>
              <div className="flex items-center gap-2">
                <button
                  type="button"
                  onClick={applyPwaUpdate}
                  disabled={isApplyingPwaUpdate}
                  className="px-3 py-1.5 rounded-lg bg-amber-500 text-white text-sm font-medium hover:bg-amber-600 disabled:opacity-60"
                >
                  {isApplyingPwaUpdate ? 'Mise à jour…' : 'Mettre à jour'}
                </button>
                <button
                  type="button"
                  onClick={() => setPwaUpdateInfo(null)}
                  className="px-3 py-1.5 rounded-lg border border-amber-300 text-amber-800 text-sm font-medium hover:bg-amber-100"
                >
                  Plus tard
                </button>
              </div>
            </div>
          )}

          {pwaOfflineReady && (
            <div className="mb-4 bg-emerald-50 border border-emerald-200 rounded-2xl p-3 flex items-center justify-between gap-3">
              <p className="text-sm text-emerald-800">Mode hors ligne prêt: SunApp est installé en cache local.</p>
              <button
                type="button"
                onClick={() => setPwaOfflineReady(false)}
                className="px-3 py-1 rounded-lg border border-emerald-300 text-emerald-700 text-sm font-medium hover:bg-emerald-100"
              >
                OK
              </button>
            </div>
          )}

          {installPromptEvent && (
            <div className="mb-4 bg-sky-50 border border-sky-200 rounded-2xl p-4 flex flex-wrap items-center justify-between gap-3">
              <p className="text-sm text-sky-800">Installer SunApp sur l’écran d’accueil pour un accès plus rapide.</p>
              <button
                type="button"
                onClick={installPwa}
                className="px-3 py-1.5 rounded-lg bg-sky-500 text-white text-sm font-medium hover:bg-sky-600"
              >
                Installer l’app
              </button>
            </div>
          )}

          <div className="mb-4 bg-white rounded-2xl shadow-md border border-slate-100 p-4">
            <div className="flex flex-wrap items-center justify-between gap-3">
              <p className="text-sm text-slate-700">{geoBannerText}</p>
              <button
                type="button"
                onClick={requestUserGeolocation}
                disabled={requestingGeo}
                className="px-3 py-1.5 rounded-lg bg-sky-500 text-white text-sm font-medium hover:bg-sky-600 disabled:opacity-60"
              >
                {requestingGeo ? 'Localisation…' : 'Utiliser ma position'}
              </button>
            </div>
            <p className="text-xs text-slate-500 mt-2">
              {isSecureGeoContext
                ? 'Si le GPS est refusé, l’app continue avec une position de secours.'
                : 'Sur Safari iOS, la géolocalisation fonctionne seulement sur HTTPS (ou localhost).'}
            </p>
          </div>

          {/* Carte + rayon d'action (en dessous) */}
          <div className="mb-4">
            <div className="bg-white rounded-2xl shadow-md border border-slate-100 overflow-hidden min-h-[280px] h-[340px]" ref={mapRef} id="map" />
            <div className="mt-3 bg-white rounded-2xl shadow-md border border-slate-100 p-4">
              <label className="block text-sm font-medium text-slate-700 mb-2">Rayon d'action : ~{formatTravelTime(travelTimeMin)} (≈ {radiusKm} km)</label>
              <input
                type="range"
                min="0"
                max={TRAVEL_TIME_PRESETS_MIN.length - 1}
                step="1"
                value={travelTimeIndex}
                onChange={(e) => setTravelTimeIndex(Number(e.target.value))}
                className="w-full h-2 bg-slate-200 rounded-full appearance-none cursor-pointer"
                style={{ background: `linear-gradient(to right, #36A7EB 0%, #36A7EB ${(travelTimeIndex / (TRAVEL_TIME_PRESETS_MIN.length - 1)) * 100}%, #e2e8f0 ${(travelTimeIndex / (TRAVEL_TIME_PRESETS_MIN.length - 1)) * 100}%, #e2e8f0 100%)` }}
              />
              <div className="flex justify-between text-xs text-slate-500 mt-1">
                <span>15 min</span>
                <span>3 h</span>
              </div>
              <p className="text-xs text-slate-400 mt-0.5">Estimation à vol d'oiseau (≈ 70 km/h)</p>
            </div>
          </div>

          <div className="grid grid-cols-1 lg:grid-cols-3 gap-4 mb-6">
            <div className="bg-white rounded-2xl shadow-md border border-slate-100 p-4 lg:col-span-2">
              <label className="block text-sm font-medium text-slate-700 mb-2">Temperature ressentie min. : {minTemp} °C</label>
              <input
                type="range"
                min="10"
                max="25"
                step="1"
                value={minTemp}
                onChange={(e) => setMinTemp(Number(e.target.value))}
                className="w-full h-2 bg-slate-200 rounded-full appearance-none cursor-pointer"
                style={{ background: `linear-gradient(to right, #36A7EB 0%, #36A7EB ${((minTemp - 10) / 15) * 100}%, #e2e8f0 ${((minTemp - 10) / 15) * 100}%, #e2e8f0 100%)` }}
              />
              <div className="flex justify-between text-xs text-slate-500 mt-1">
                <span>10 °C</span>
                <span>25 °C</span>
              </div>
              <label className="block text-sm font-medium text-slate-700 mt-4 mb-2">Vent max : {maxWindKmh} km/h</label>
              <input
                type="range"
                min="0"
                max="60"
                step="5"
                value={maxWindKmh}
                onChange={(e) => setMaxWindKmh(Number(e.target.value))}
                className="w-full h-2 bg-slate-200 rounded-full appearance-none cursor-pointer"
                style={{ background: `linear-gradient(to right, #36A7EB 0%, #36A7EB ${(maxWindKmh / 60) * 100}%, #e2e8f0 ${(maxWindKmh / 60) * 100}%, #e2e8f0 100%)` }}
              />
              <div className="flex justify-between text-xs text-slate-500 mt-1">
                <span>0 (tous)</span>
                <span>60 km/h</span>
              </div>
              <label className="block text-sm font-medium text-slate-700 mt-4 mb-2">Météo : {weatherLevelLabel}</label>
              <input
                type="range"
                min="0"
                max="4"
                step="1"
                value={minWeatherLevel}
                onChange={(e) => setMinWeatherLevel(Number(e.target.value))}
                className="w-full h-2 bg-slate-200 rounded-full appearance-none cursor-pointer"
                style={{ background: `linear-gradient(to right, #36A7EB 0%, #36A7EB ${(minWeatherLevel / 4) * 100}%, #e2e8f0 ${(minWeatherLevel / 4) * 100}%, #e2e8f0 100%)` }}
              />
              <div className="grid grid-cols-5 gap-1 text-[10px] text-slate-500 mt-1">
                {WEATHER_FILTER_LEVELS.map((level, idx) => (
                  <span
                    key={level.value}
                    className={idx === 0 ? 'text-left' : idx === WEATHER_FILTER_LEVELS.length - 1 ? 'text-right' : 'text-center'}
                  >
                    {level.label}
                  </span>
                ))}
              </div>
              <button
                type="button"
                onClick={() => runSearch()}
                disabled={loading}
                className="mt-3 w-full flex items-center justify-center gap-2 px-4 py-2 rounded-xl bg-sky-400 text-white hover:bg-sky-500 disabled:opacity-50 text-sm font-medium"
              >
                <IconRefresh /> {loading ? 'Recherche…' : 'Rechercher'}
              </button>
            </div>
          </div>

          {error && position && (
            <div className="bg-amber-50 border border-amber-200 rounded-2xl p-4 mb-4 flex items-center gap-3 text-amber-800">
              <IconAlertCircle />
              <p>{error}</p>
            </div>
          )}

          {/* Carte principale avec bannière bleue (style maquette) */}
          <div className="bg-white rounded-2xl shadow-lg border border-slate-100 overflow-hidden">
            <div className="bg-[#36A7EB] text-white px-6 py-4 rounded-t-2xl">
              <h2 className="text-lg font-bold">
                {isFallbackMode ? `Zones météo (${activeScopeInfo?.label || "Aujourd'hui"})` : `Zones météo près de ${locationTitle} • ${activeScopeInfo?.label || "Aujourd'hui"}`}
              </h2>
              <p className="text-sm text-white/90 mt-0.5">
                {loading && position
                  ? 'Recherche en cours…'
                  : scopedCities.length === 0 && !error
                    ? 'Appuyez sur Rechercher pour lancer une recherche.'
                    : (displayedCities.length !== scopedCities.length ? `${destinationLabel} — ${displayedCities.length} affichés` : destinationLabel)}
                {isFallbackMode && scopedCities.length > 0 && ' — triés du moins nuageux au plus proche'}
              </p>
            </div>
            <div className="p-4 md:p-6">
              {loading && position ? (
                <div className="bg-slate-50 rounded-xl py-8">
                  <RadarScanner />
                </div>
              ) : (
                <>
                  {scopedCities.length > 0 && (
                    <label className="flex items-center gap-2 mb-4 text-slate-600 text-sm font-medium">
                      Trier par :
                      <select
                        value={sortBy}
                        onChange={(e) => setSortBy(e.target.value)}
                        className="rounded-lg border border-slate-200 px-3 py-1.5 text-sm bg-white text-slate-800"
                      >
                        <option value="distance">Le plus proche</option>
                        <option value="hottest">Le plus chaud</option>
                        <option value="calm">Le moins de vent</option>
                        <option value="clearest">Ciel le plus pur</option>
                        <option value="sunscore">Le Choix Parfait (WeatherScore)</option>
                      </select>
                    </label>
                  )}
                  <div className="grid grid-cols-1 sm:grid-cols-2 xl:grid-cols-3 gap-4">
                    {displayedCities.map((city, idx) => (
                      <CityCard
                        key={city.id}
                        city={city}
                        rank={idx + 1}
                        cardId={`city-card-${idx + 1}`}
                        userLat={position?.lat}
                        userLon={position?.lon}
                        onShowOnMap={setSelectedCity}
                        isRecommended={sortBy === 'sunscore' && idx === 0}
                      />
                    ))}
                  </div>
                  {!loading && position && scopedCities.length > 0 && displayedCities.length === 0 && (
                    <p className="text-slate-500 text-center py-6">Aucun lieu ne correspond aux filtres.</p>
                  )}
                </>
              )}
              {!loading && position && scopedCities.length === 0 && !error && (
                <p className="text-slate-500 text-center py-8">Aucune zone trouvée. Augmentez le rayon.</p>
              )}
            </div>
          </div>
          <footer className="mt-8 py-4 text-center text-slate-400 text-sm">
            Version {APP_VERSION} • Build {APP_BUILD}
          </footer>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
