  <script type="text/babel" data-type="module">
    const { useState, useEffect, useRef, useMemo } = React;
    const APP_VERSION = '0.04';
    const APP_BUILD = '04/03/2026 - 17h10';

    // ---------- Utilitaires ----------
    function haversine(lat1, lon1, lat2, lon2) {
      const R = 6371; // km
      const dLat = (lat2 - lat1) * Math.PI / 180;
      const dLon = (lon2 - lon1) * Math.PI / 180;
      const a =
        Math.sin(dLat/2) * Math.sin(dLat/2) +
        Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) *
        Math.sin(dLon/2) * Math.sin(dLon/2);
      const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
      return R * c;
    }

    const SUN_CODES = [0, 1, 2]; // 0=clear, 1=mainly clear, 2=partly cloudy
    // Niveaux météo pour le slider : 0=tout, 1=pas neige/orage, 2=pas précipitations, 3=nuages ok, 4=soleil
    const WEATHER_LEVEL_CODES = {
      0: null,
      1: [0,1,2,3,45,48,51,53,55,56,57,61,63,65,66,67,80,81,82],
      2: [0,1,2,3,45,48],
      3: [0,1,2,3],
      4: [0,1,2],
    };
    const WEATHER_LEVEL_LABELS = ['Tout temps', 'Pas de neige ni orage', 'Pas de pluie', 'Nuages OK', 'Soleil uniquement'];

    // Vent : score 0–100 (même formule que WeatherScore) pour affichage des alertes dans les cartes
    function getWindScoreValue(windKmh) {
      if (windKmh == null) return 100;
      const w = Number(windKmh);
      return w <= 20 ? Math.max(0, 100 - 2 * w) : Math.max(0, 60 - 4 * (w - 20));
    }

    // Score météo 0-5 pour affichage sur les cartes (tag sur l'image)
    const WEATHER_SCORE_CONFIG = [
      { score: 0, emoji: '💩', label: 'Nul', desc: 'Pluie battante, vent violent ou froid polaire. On reste à l\'abri !', badgeClass: 'bg-red-600 text-white' },
      { score: 1, emoji: '⛈️', label: 'Médiocre', desc: 'Grisaille dominante, petit vent frais. Pas l\'idéal pour une sortie.', badgeClass: 'bg-orange-600 text-white' },
      { score: 2, emoji: '⛅', label: 'Passable', desc: 'Quelques éclaircies mais le fond de l\'air reste frais ou instable.', badgeClass: 'bg-amber-600 text-white' },
      { score: 3, emoji: '🌤️', label: 'Agréable', desc: 'Le soleil est là, le vent est calme. Une bonne journée pour s\'aérer !', badgeClass: 'bg-yellow-500 text-slate-900' },
      { score: 4, emoji: '☀️', label: 'Radieux', desc: 'Grand ciel bleu, température idéale. On sort les lunettes de soleil !', badgeClass: 'bg-emerald-500 text-white' },
      { score: 5, emoji: '😎', label: 'Parfait', desc: 'Conditions de carte postale : chaud, sans vent et 100% ensoleillé !', badgeClass: 'bg-green-500 text-white' },
    ];
    function getWeatherScore(city) {
      const code = city.weather_code ?? 99;
      const felt = city.feelsLike ?? city.temp ?? 15;
      const wind = city.wind_speed ?? 0;
      const sunny = SUN_CODES.includes(code);
      const rainSnowStorm = [51,53,55,56,57,61,63,65,66,67,71,73,75,77,80,81,82,85,86,95,96,99].includes(code);
      const overcastFog = [3,45,48].includes(code);
      let raw = 2;
      if (rainSnowStorm || felt < 0 || wind > 70) raw = 0;
      else if (overcastFog || felt < 8 || wind > 50) raw = 1;
      else if (sunny && felt >= 22 && wind < 15) raw = 5;
      else if (sunny && felt >= 20 && wind < 30) raw = 4;
      else if (sunny && felt >= 15) raw = 3;
      else if (sunny || code === 2) raw = felt >= 12 ? 3 : 2;
      else raw = felt >= 10 ? 2 : 1;
      if (wind >= 30 && raw > 2) raw = 2;
      const config = WEATHER_SCORE_CONFIG[Math.min(raw, 5)];
      return { ...config, score: raw };
    }

    // Rayon d'action : temps de trajet → rayon approximatif (vitesse moyenne 70 km/h, routes mixtes)
    const TRAVEL_TIME_PRESETS_MIN = [15, 30, 45, 60, 90, 120, 150, 180];
    const AVG_DRIVE_SPEED_KMH = 70;
    function travelTimeToRadiusKm(minutes) {
      return Math.round((minutes / 60) * AVG_DRIVE_SPEED_KMH);
    }
    function formatTravelTime(minutes) {
      if (minutes >= 60) return `${Math.floor(minutes / 60)} h${minutes % 60 ? ` ${minutes % 60} min` : ''}`;
      return `${minutes} min`;
    }

    // Température ressentie (refroidissement éolien) — formule Jagger & Osczevski (T °C, V km/h)
    function windChill(T, V) {
      if (T == null || V == null) return T;
      const v = Number(V);
      if (v < 5) return T;
      const v016 = Math.pow(v, 0.16);
      const Rc = 13.12 + 0.6215 * T - 11.37 * v016 + 0.3965 * T * v016;
      return Math.round(Rc * 10) / 10;
    }

    // Score 0–100 pour une tranche horaire (temp, vent km/h, code météo) — même logique que WeatherScore
    function weatherScoreFromSlot(temp, windKmh, weatherCode) {
      const t = temp ?? 20;
      const w = windKmh ?? 10;
      const tempScore = Math.max(0, 100 - 4 * Math.abs(t - 25));
      const windScore = w <= 20 ? Math.max(0, 100 - 2 * w) : Math.max(0, 60 - 4 * (w - 20));
      let score = (tempScore * 0.5) + (windScore * 0.5);
      if (t < 15 && w > 25) score -= 20;
      const isSunny = SUN_CODES.includes(weatherCode ?? -1);
      if (!isSunny) score *= 0.5;
      return Math.max(0, Math.min(100, score));
    }
    // Libellés météo WMO (Open-Meteo) en français
    const WEATHER_LABELS = {
      0: 'Ciel dégagé', 1: 'Plutôt dégagé', 2: 'Partiellement nuageux', 3: 'Couvert',
      45: 'Brouillard', 48: 'Brouillard givrant', 51: 'Bruine légère', 53: 'Bruine', 55: 'Bruine dense',
      56: 'Bruine verglaçante légère', 57: 'Bruine verglaçante dense', 61: 'Pluie légère', 63: 'Pluie modérée', 65: 'Pluie forte',
      66: 'Pluie verglaçante légère', 67: 'Pluie verglaçante forte', 71: 'Neige légère', 73: 'Neige modérée', 75: 'Neige forte',
      77: 'Grains de neige', 80: 'Averses légères', 81: 'Averses modérées', 82: 'Averses violentes',
      85: 'Légères chutes de neige', 86: 'Fortes chutes de neige', 95: 'Orage', 96: 'Orage avec grêle légère', 99: 'Orage avec grêle forte',
    };
    function getWeatherLabel(code) {
      return WEATHER_LABELS[code] != null ? WEATHER_LABELS[code] : '—';
    }

    const PLACE_TYPE_LABELS = { city: 'Ville', town: 'Bourg', village: 'Village', hamlet: 'Hameau', locality: 'Lieu-dit', suburb: 'Agglomération', quarter: 'Quartier', isolated_dwelling: 'Écart', resort: 'Station / Domaine', attraction: 'Site', theme_park: 'Parc', park: 'Parc', nature_reserve: 'Réserve', picnic_site: 'Aire', stadium: 'Stade', pitch: 'Terrain' };
    function getPlaceTypeLabel(type) {
      return PLACE_TYPE_LABELS[type] || type || 'Lieu';
    }

    const MAX_GEO_IMAGE_DISTANCE_M = 10000;
    const MAX_REGION_PHOTOS = 8;
    const CARD_PHOTO_CACHE = new Map();
    const NON_SCENIC_IMAGE_HINTS = /\b(map|carte|plan|logo|flag|drapeau|blason|coat[_ -]?of[_ -]?arms|symbol|diagram|locator|location map|svg)\b/i;

    function getCardPhotoCacheKey(lat, lon) {
      return `${Number(lat).toFixed(4)},${Number(lon).toFixed(4)}`;
    }

    function sanitizeCommonsTitle(title) {
      return (title || '').replace(/^File:/i, '').replace(/_/g, ' ');
    }

    async function fetchJson(url, signal) {
      const res = await fetch(url, { signal });
      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      return res.json();
    }

    async function fetchZonePhotoSlides(lat, lon, signal) {
      let primarySlide = null;
      try {
        const nearbyWiki = await fetchJson(
          `https://fr.wikipedia.org/w/api.php?action=query&list=geosearch&gscoord=${lat}|${lon}&gsradius=${MAX_GEO_IMAGE_DISTANCE_M}&gslimit=8&format=json&origin=*`,
          signal
        );
        const nearestWiki = (nearbyWiki?.query?.geosearch || []).find((item) => item?.pageid && (item?.dist ?? Infinity) <= MAX_GEO_IMAGE_DISTANCE_M);
        if (nearestWiki?.pageid) {
          const wikiImageData = await fetchJson(
            `https://fr.wikipedia.org/w/api.php?action=query&prop=pageimages&pithumbsize=900&pageids=${nearestWiki.pageid}&format=json&origin=*`,
            signal
          );
          const wikiPage = wikiImageData?.query?.pages && Object.values(wikiImageData.query.pages)[0];
          const wikiThumb = wikiPage?.thumbnail?.source;
          if (wikiThumb) {
            primarySlide = {
              url: wikiThumb,
              label: wikiPage?.title || 'Lieu proche',
              distanceM: Math.round(nearestWiki.dist || 0),
              source: 'wikipedia',
            };
          }
        }
      } catch (_) {}

      let regionSlides = [];
      try {
        const commonsGeo = await fetchJson(
          `https://commons.wikimedia.org/w/api.php?action=query&list=geosearch&gscoord=${lat}|${lon}&gsradius=${MAX_GEO_IMAGE_DISTANCE_M}&gslimit=30&gsnamespace=6&format=json&origin=*`,
          signal
        );
        const commonsCandidates = (commonsGeo?.query?.geosearch || [])
          .filter((item) => item?.pageid && (item?.dist ?? Infinity) <= MAX_GEO_IMAGE_DISTANCE_M)
          .sort((a, b) => (a.dist ?? 0) - (b.dist ?? 0));
        if (commonsCandidates.length > 0) {
          const pageIds = commonsCandidates.map((item) => item.pageid).join('|');
          const commonsInfo = await fetchJson(
            `https://commons.wikimedia.org/w/api.php?action=query&prop=imageinfo&pageids=${pageIds}&iiprop=url|mime&iiurlwidth=1200&format=json&origin=*`,
            signal
          );
          const byPageId = new Map(commonsCandidates.map((item) => [String(item.pageid), item]));
          const seenUrls = new Set(primarySlide ? [primarySlide.url] : []);
          regionSlides = Object.values(commonsInfo?.query?.pages || {})
            .map((page) => {
              const candidate = byPageId.get(String(page?.pageid));
              const info = page?.imageinfo?.[0];
              const imgUrl = info?.thumburl || info?.url || null;
              const mime = info?.mime || '';
              const title = sanitizeCommonsTitle(page?.title || candidate?.title || '');
              if (!candidate || !imgUrl || !mime.startsWith('image/')) return null;
              if (/svg|gif/i.test(mime)) return null;
              if (NON_SCENIC_IMAGE_HINTS.test(title)) return null;
              if (seenUrls.has(imgUrl)) return null;
              seenUrls.add(imgUrl);
              return {
                url: imgUrl,
                label: title,
                distanceM: Math.round(candidate.dist || 0),
                source: 'commons',
              };
            })
            .filter(Boolean)
            .sort((a, b) => (a.distanceM ?? 0) - (b.distanceM ?? 0))
            .slice(0, MAX_REGION_PHOTOS);
        }
      } catch (_) {}

      const slides = [];
      if (primarySlide && (primarySlide.distanceM ?? Infinity) <= MAX_GEO_IMAGE_DISTANCE_M) slides.push(primarySlide);
      slides.push(...regionSlides.filter((slide) => (slide.distanceM ?? Infinity) <= MAX_GEO_IMAGE_DISTANCE_M));
      return slides.slice(0, MAX_REGION_PHOTOS + 1);
    }

    // ---------- Icônes (Lucide-style inline SVGs) ----------
    const IconSun = (props) => (

    );
    const IconWind = (props) => (

    );
    const IconThermometer = (props) => (
      <svg {...props} xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M14 4v10.54a4 4 0 1 1-4 0V4a2 2 0 0 1 4 0Z"/></svg>
    );
    const IconAlertCircle = (props) => (
      <svg {...props} xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
    );
    const IconRefresh = (props) => (
      <svg {...props} xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/></svg>
    );
    const IconClock = (props) => (

    );
    const IconDroplet = (props) => (
      <svg {...props} xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M12 22a7 7 0 0 0 7-7c0-2-1-3.9-3-5.5s-3.5-4-4-6.5c-.5 2.5-2 4.9-4 6.5C6 11.1 5 13 5 15a7 7 0 0 0 7 7z"/></svg>
    );
    const IconCamera = (props) => (
      <svg {...props} xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M14.5 4h-5L7 7H4a2 2 0 0 0-2 2v9a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2V9a2 2 0 0 0-2-2h-3l-2.5-3z"/><circle cx="12" cy="13" r="3"/></svg>
    );
    const IconCloudSun = (props) => (
      <svg {...props} xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M12 2v2M4.93 4.93l1.41 1.41M2 12h2M4.93 19.07l1.41-1.41M12 22v-2M19.07 19.07l-1.41-1.41M22 12h-2"/><path d="M12 6a4 4 0 0 0-4 4 4 4 0 0 0 4 4h6a4 4 0 0 0 0-8 4 4 0 0 0-4-4Z"/></svg>
    );
    const IconExternalLink = (props) => (
      <svg {...props} xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M15 3h6v6"/><path d="M10 14 21 3"/><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/></svg>
    );

    // ---------- RadarScanner (animation chargement) ----------
    function RadarScanner() {
      return (
        <div className="flex flex-col items-center justify-center gap-4 py-8">
          <div className="radar-scanner">
            <div className="radar-dot" style={{ top: '50%', left: '50%', transform: 'translate(-50%, -50%)' }} />
          </div>
          <p className="text-sm text-slate-500">Scan des villes en cours...</p>
        </div>
      );
    }

    function getWeatherIcon(code) {
      if (code === 0) return '☀️';
      if ([1, 2].includes(code)) return '🌤️';
      if (code === 3) return '☁️';
      if ([45, 48].includes(code)) return '🌫️';
      if ([71, 73, 75, 77, 85, 86].includes(code)) return '❄️';
      if ([95, 96, 99].includes(code)) return '⛈️';
      if ([51, 53, 55, 56, 57, 61, 63, 65, 66, 67, 80, 81, 82].includes(code)) return '🌧️';
      return '⛅';
    }

    // ---------- TrendTimeline : aperçu horaire lisible sur 5 créneaux ----------
    function TrendTimeline({ slots, peakIndex }) {
      if (!slots || slots.length === 0) return null;
      const bestIndex = peakIndex >= 0
        ? peakIndex
        : slots.reduce((best, s, i) => (s.score > slots[best].score ? i : best), 0);
      const bestSlot = slots[bestIndex] || slots[0];
      return (
        <div className="w-full">
          {bestSlot && (
            <p className="text-xs text-slate-600 mb-2">
              Meilleur créneau: <span className="font-semibold text-slate-800">{bestSlot.label || '—'}</span>
              {bestSlot.feelsLike != null ? ` • ressenti ${Math.round(bestSlot.feelsLike)}°C` : ''}
              {bestSlot.windKmh != null ? ` • vent ${Math.round(bestSlot.windKmh)} km/h` : ''}
            </p>
          )}
          <div className="flex gap-2 overflow-x-auto pb-1 snap-x snap-mandatory">
            {slots.slice(0, 5).map((slot, i) => {
              const isBest = i === bestIndex;
              return (
                <div
                  key={i}

    // ---------- App ----------
    function App() {
      const [position, setPosition] = useState(null);
      const [travelTimeIndex, setTravelTimeIndex] = useState(3);
      const [cities, setCities] = useState([]);
      const [isFallbackMode, setIsFallbackMode] = useState(false);
      const [loading, setLoading] = useState(false);
      const [error, setError] = useState(null);
      const [selectedCity, setSelectedCity] = useState(null);
      const [sortBy, setSortBy] = useState('sunscore');
      const [minTemp, setMinTemp] = useState(0);
      const [maxWindKmh, setMaxWindKmh] = useState(0);
      const [minWeatherLevel, setMinWeatherLevel] = useState(0);
      const mapRef = useRef(null);
      const mapInstanceRef = useRef(null);
      const markersRef = useRef([]);
      const circleRef = useRef(null);
      const searchSeqRef = useRef(0);
      const searchAbortRef = useRef(null);

      const travelTimeMin = TRAVEL_TIME_PRESETS_MIN[Math.min(travelTimeIndex, TRAVEL_TIME_PRESETS_MIN.length - 1)];
      const radiusKm = travelTimeToRadiusKm(travelTimeMin);

      // WeatherScore 0–100 : météo pure (temp 50 %, vent 50 %). Malus ×0,5 si pas ensoleillé/ciel dégagé.
      function weatherScore(city) {
        const t = (city.feelsLike != null ? city.feelsLike : city.temp) ?? 20;
        const w = city.wind_speed != null ? city.wind_speed : 10;
        const tempScore = Math.max(0, 100 - 4 * Math.abs(t - 25));
        // Vent : -2 pts/km/h jusqu'à 20 km/h, puis -4 pts/km/h au-delà
        const windScore = w <= 20
          ? Math.max(0, 100 - 2 * w)
          : Math.max(0, 60 - 4 * (w - 20));
        let score = (tempScore * 0.5) + (windScore * 0.5);
        if (t < 15 && w > 25) score -= 20; // ressenti glacial
        const isSunny = SUN_CODES.includes(city.weather_code ?? -1);
        if (!isSunny) score *= 0.5;
        return Math.max(0, Math.min(100, score));
      }

      const displayedCities = useMemo(() => {
        let list = [...cities];
        if (minTemp > 0) list = list.filter((c) => {
          const t = c.feelsLike != null ? c.feelsLike : c.temp;
          return t != null && t >= minTemp;
        });
        if (maxWindKmh > 0) list = list.filter((c) => c.wind_speed != null && c.wind_speed <= maxWindKmh);
        if (minWeatherLevel > 0) {
          const allowed = WEATHER_LEVEL_CODES[minWeatherLevel];
          if (allowed) list = list.filter((c) => allowed.includes(c.weather_code ?? -1));
        }
        if (sortBy === 'distance' && position) list.sort((a, b) => haversine(position.lat, position.lon, a.lat, a.lon) - haversine(position.lat, position.lon, b.lat, b.lon));
        else if (sortBy === 'hottest') {
          const felt = (c) => c.feelsLike != null ? c.feelsLike : c.temp ?? -999;
          list.sort((a, b) => {
            const fa = felt(a), fb = felt(b);
            const bandA = Math.round(fa), bandB = Math.round(fb);
            if (bandA !== bandB) return bandB - bandA;
            return fb - fa;
          });
        }
        else if (sortBy === 'calm') list.sort((a, b) => (a.wind_speed ?? 999) - (b.wind_speed ?? 999));
        else if (sortBy === 'clearest') list.sort((a, b) => (a.cloud_cover ?? 999) - (b.cloud_cover ?? 999));
        else if (sortBy === 'sunscore') {
          list.sort((a, b) => {
            const sa = weatherScore(a), sb = weatherScore(b);
            if (sb !== sa) return sb - sa;
            if (!position) return 0;
            return haversine(position.lat, position.lon, a.lat, a.lon) - haversine(position.lat, position.lon, b.lat, b.lon);
          });
        }
        return list;
      }, [cities, sortBy, minTemp, maxWindKmh, minWeatherLevel, position]);

      function generateSearchGrid(lat, lon, radiusKm, stepKm = 15, maxPoints = 320) {
        const points = [];
        const degLatPerKm = 1 / 111;
        const latStep = stepKm * degLatPerKm;
        const lonStep = stepKm / (111 * Math.max(Math.cos((lat * Math.PI) / 180), 0.2));
        const latDelta = radiusKm * degLatPerKm;
        const lonDelta = radiusKm / (111 * Math.max(Math.cos((lat * Math.PI) / 180), 0.2));
        for (let y = -latDelta; y <= latDelta; y += latStep) {
          for (let x = -lonDelta; x <= lonDelta; x += lonStep) {
            const pLat = lat + y;
            const pLon = lon + x;
            if (haversine(lat, lon, pLat, pLon) <= radiusKm) {
              points.push({ lat: Number(pLat.toFixed(5)), lon: Number(pLon.toFixed(5)) });
            }
          }
        }
        if (points.length <= maxPoints) return points;
        const stride = points.length / maxPoints;
        const sampled = [];
        for (let i = 0; i < maxPoints; i++) sampled.push(points[Math.floor(i * stride)]);
        return sampled;
      }

      async function reverseGeocodeFrBatch(points, signal) {
        const directionLabel = (fromLat, fromLon, toLat, toLon) => {
          const dLon = ((toLon - fromLon) * Math.PI) / 180;
          const y = Math.sin(dLon) * Math.cos((toLat * Math.PI) / 180);
          const x = Math.cos((fromLat * Math.PI) / 180) * Math.sin((toLat * Math.PI) / 180)
            - Math.sin((fromLat * Math.PI) / 180) * Math.cos((toLat * Math.PI) / 180) * Math.cos(dLon);
          const brng = (Math.atan2(y, x) * 180 / Math.PI + 360) % 360;
          const dirs = ['Nord', 'Nord-Est', 'Est', 'Sud-Est', 'Sud', 'Sud-Ouest', 'Ouest', 'Nord-Ouest'];
          return dirs[Math.round(brng / 45) % 8];
        };
        const fallbackLabel = (p, idx) => {
          if (!position) return `Spot meteo ${idx + 1}`;
          const dist = Math.max(1, Math.round(haversine(position.lat, position.lon, p.lat, p.lon)));
          const dir = directionLabel(position.lat, position.lon, p.lat, p.lon);
          return `Spot ${dir} (${dist} km)`;
        };
        const lookupOne = async (p, idx) => {
          const url = `https://api-adresse.data.gouv.fr/reverse/?lon=${p.lon}&lat=${p.lat}`;
          try {
            const res = await fetch(url, { signal });
            if (!res.ok) return null;
            const data = await res.json();
            const feat = data?.features?.[0];
            const props = feat?.properties || {};
            const label = props.city || props.name || props.label || fallbackLabel(p, idx);
            return { ...p, name: label, type: props.type || 'zone' };
          } catch (e) {
            return null;
          }
        };
        const out = [];
        for (let i = 0; i < points.length; i++) {
          const item = await lookupOne(points[i], i);
          out.push(item || { ...points[i], name: fallbackLabel(points[i], i), type: 'zone' });
        }
        return out;
      }

      // Géolocalisation au chargement
      useEffect(() => {
        if (!navigator.geolocation) {
          setError('La géolocalisation n\'est pas supportée par votre navigateur.');
          setLoading(false);
          return;
        }
        navigator.geolocation.getCurrentPosition(
          (pos) => {
            setPosition({ lat: pos.coords.latitude, lon: pos.coords.longitude });
            setError(null);
          },
          (err) => {
            const messages = {
              1: 'Accès à la position refusé. Autorisez la géolocalisation pour utiliser SunApp.',
              2: 'Position indisponible. Vérifiez votre connexion ou le GPS.',
              3: 'Délai de géolocalisation dépassé. Réessayez.',
            };
            setError(messages[err.code] || 'Erreur de géolocalisation.');
            setLoading(false);
          },
          { enableHighAccuracy: true, timeout: 15000, maximumAge: 60000 }
        );
      }, []);

      // Recherche météo par maillage (grille dans le rayon) + Open-Meteo batch + API Géo
      async function runSearch() {
        if (!position) return;
        const searchSeq = searchSeqRef.current + 1;
        searchSeqRef.current = searchSeq;
        if (searchAbortRef.current) searchAbortRef.current.abort();
        const abortController = new AbortController();
        searchAbortRef.current = abortController;
        const { signal } = abortController;
        const isCurrentSearch = () => searchSeqRef.current === searchSeq;
        const finishIfCurrent = () => {
          if (!isCurrentSearch()) return;
          searchAbortRef.current = null;
          setLoading(false);
        };

        setLoading(true);
        setError(null);
        setCities([]);
        setIsFallbackMode(false);

        const grid = generateSearchGrid(position.lat, position.lon, radiusKm, 15, 320);
        if (grid.length === 0) {
          setError('Aucun point de recherche disponible. Élargissez le rayon.');
          finishIfCurrent();
          return;
        }

        function mergeMeteo(points, results) {
          const list = Array.isArray(results) ? results : [results];
          const now = new Date();
          return points.map((p, i) => {
            const r = list[i];
            const cur = r?.current || {};
            // Si données météo incomplètes, on ignore ce point (pas de fallback arbitraire)
            if (cur.temperature_2m == null || cur.wind_speed_10m == null || cur.weather_code == null) return null;
            const hourly = r?.hourly || {};
            const temp = cur.temperature_2m;
            const wind = cur.wind_speed_10m;
            const feelsLike = windChill(temp, wind);
            const times = hourly.time || [];
            const temps = hourly.temperature_2m || [];
            const winds = hourly.wind_speed_10m || [];
            const codes = hourly.weather_code || [];
            let trendSlots = [];
            const pushTrendSlot = (label, t, w, code) => {
              const felt = windChill(t, w);
              const score = weatherScoreFromSlot(felt ?? t, w, code);
              trendSlots.push({
                label,
                temp: t != null ? Number(t) : null,
                feelsLike: felt != null ? felt : (t != null ? Number(t) : null),
                windKmh: w != null ? Number(w) : null,
                weatherCode: code ?? null,
                score,
              });
              return score;
            };

            const currentScore = pushTrendSlot('Maintenant', temp, wind, cur.weather_code);
            let idx = times.findIndex((timeStr) => new Date(timeStr) > now);
            if (idx === -1) idx = 0;
            for (let k = 0; k < 4 && idx + k < times.length; k++) {
              const j = idx + k;
              const t = temps[j];
              const w = winds[j];
              const code = codes[j];
              const d = new Date(times[j]);
              const label = Number.isNaN(d.getTime()) ? '—' : d.getHours() + 'h';
              pushTrendSlot(label, t, w, code);
            }
            while (trendSlots.length < 5) {
              pushTrendSlot(trendSlots[trendSlots.length - 1]?.label || '—', temp, wind, cur.weather_code);
            }
            const avgFuture = trendSlots.length > 1
              ? trendSlots.slice(1).reduce((a, b) => a + (b.score ?? 0), 0) / (trendSlots.length - 1)
              : currentScore;
            const improvesSoon = trendSlots.length > 1 && (avgFuture >= currentScore * 1.2);
            const peakIndex = trendSlots.length > 0
              ? trendSlots.reduce((best, slot, idx) => (slot.score > trendSlots[best].score ? idx : best), 0)
              : 0;
            const showPeak = peakIndex > 0 && trendSlots[peakIndex].score > currentScore + 10;

            return {
              id: `grid-${i}`,
              name: `Zone ${i + 1}`,
              type: 'zone',
              ...p,
              temp,
              feelsLike: feelsLike != null ? feelsLike : temp,
              weather_code: cur.weather_code,
              wind_speed: wind,
              humidity: cur.relative_humidity_2m,
              cloud_cover: cur.cloud_cover,
              _dist: haversine(position.lat, position.lon, p.lat, p.lon),
              weatherScore100: currentScore,
              trendSlots: trendSlots.slice(0, 5),
              hourlyTrend: trendSlots.slice(0, 5).map((s) => s.score),
              trendTimes: trendSlots.slice(0, 5).map((s) => s.label),
              improvesSoon: !!improvesSoon,
              peakIndex: showPeak ? peakIndex : -1,
            };
          }).filter(Boolean);
        }

        try {
          const baseUrl = 'https://api.open-meteo.com/v1/forecast';
          const params = 'current=temperature_2m,weather_code,wind_speed_10m,relative_humidity_2m,cloud_cover&hourly=temperature_2m,weather_code,wind_speed_10m&forecast_days=1&timezone=auto';
          const fetchMeteoBatch = async (pts) => {
            const latStr = pts.map((p) => p.lat).join(',');
            const lonStr = pts.map((p) => p.lon).join(',');
            const url = `${baseUrl}?latitude=${latStr}&longitude=${lonStr}&${params}`;
            const meteoRes = await fetch(url, { signal });
            if (!meteoRes.ok) throw new Error('Service météo indisponible. Réessayez.');
            return meteoRes.json();
          };

          // Tentative en une requête ; fallback chunké si la réponse est partielle/incomplète
          let meteoData = await fetchMeteoBatch(grid);
          let scored = mergeMeteo(grid, meteoData);
          if (scored.length < Math.max(20, Math.floor(grid.length * 0.6))) {
            const chunkSize = 80;
            const chunks = [];
            for (let i = 0; i < grid.length; i += chunkSize) chunks.push(grid.slice(i, i + chunkSize));
            const partials = await Promise.all(chunks.map(async (chunk, chunkIdx) => {
              const data = await fetchMeteoBatch(chunk);
              return mergeMeteo(chunk, data).map((p, j) => ({ ...p, id: `grid-${chunkIdx}-${j}` }));
            }));
            scored = partials.flat();
          }
          if (scored.length === 0) throw new Error('Aucune donnée météo exploitable dans le rayon.');
          const byScoreThenDist = (a, b) => {
            const sDiff = (b.weatherScore100 ?? 0) - (a.weatherScore100 ?? 0);
            if (sDiff !== 0) return sDiff;
            return (a._dist ?? 0) - (b._dist ?? 0);
          };
          const pickTopWithDistanceSpread = (list, n = 20) => {
            const rings = 5;
            const perRing = Math.max(1, Math.floor(n / rings));
            const picked = [];
            const used = new Set();
            const maxD = Math.max(radiusKm, 1);
            for (let r = 0; r < rings; r++) {
              const minD = (maxD * r) / rings;
              const maxRingD = (maxD * (r + 1)) / rings;
              const ringItems = list
                .filter((p) => (p._dist ?? 0) >= minD && (r === rings - 1 ? (p._dist ?? 0) <= maxRingD : (p._dist ?? 0) < maxRingD))
                .sort(byScoreThenDist);
              for (let i = 0; i < ringItems.length && i < perRing; i++) {
                if (picked.length >= n) break;
                const p = ringItems[i];
                if (used.has(p.id)) continue;
                picked.push(p);
                used.add(p.id);
              }
            }
            if (picked.length < n) {
              for (const p of [...list].sort(byScoreThenDist)) {
                if (picked.length >= n) break;
                if (used.has(p.id)) continue;
                picked.push(p);
                used.add(p.id);
              }
            }
            return picked;
          };
          const top20 = pickTopWithDistanceSpread(scored, 20);
          const namedTop20 = await reverseGeocodeFrBatch(top20, signal);
          const finalList = namedTop20
            .map((p, i) => ({ ...p, id: p.id || `zone-${i}` }))
            .sort(byScoreThenDist);
          if (!isCurrentSearch()) return;
          setIsFallbackMode(finalList.filter((c) => SUN_CODES.includes(c.weather_code)).length === 0 && finalList.length > 0);
          setCities(finalList);
          finishIfCurrent();
        } catch (err) {
          if (err?.name === 'AbortError' || !isCurrentSearch()) return;
          setError(err.message || 'Recherche météo indisponible. Réessayez.');
          setCities([]);
          finishIfCurrent();
        }
      }

      useEffect(() => {
        if (position) runSearch();
      }, [position?.lat, position?.lon, radiusKm]);

      useEffect(() => {
        return () => {
          if (searchAbortRef.current) searchAbortRef.current.abort();
        };
      }, []);

      // Carte Leaflet + cercle du rayon de recherche
      useEffect(() => {
        if (!position || !mapRef.current) return;
        if (mapInstanceRef.current) {
          mapInstanceRef.current.remove();
          markersRef.current = [];
          circleRef.current = null;
        }
        const map = L.map(mapRef.current).setView([position.lat, position.lon], 8);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
          attribution: '© OpenStreetMap',
        }).addTo(map);
        L.marker([position.lat, position.lon]).addTo(map).bindPopup('Vous êtes ici');
        const circle = L.circle([position.lat, position.lon], {
          radius: radiusKm * 1000,
          color: '#1e40af',
          fillColor: '#36A7EB',
          fillOpacity: 0.2,
          weight: 2,
        }).addTo(map);
        circleRef.current = circle;
        mapInstanceRef.current = map;
        return () => {
          if (mapInstanceRef.current) {
            mapInstanceRef.current.remove();
            mapInstanceRef.current = null;
          }
          circleRef.current = null;
        };
      }, [position]);

      useEffect(() => {
        if (circleRef.current && mapInstanceRef.current) {
          circleRef.current.setRadius(radiusKm * 1000);
        }
      }, [radiusKm]);

      useEffect(() => {
        if (!mapInstanceRef.current) return;
        markersRef.current.forEach((m) => m.remove());
        markersRef.current = [];
        if (displayedCities.length === 0) return;
        displayedCities.forEach((city) => {
          const score5 = getWeatherScore(city).score;
          const radiusPx = Math.max(3, 2 + score5 * 2.6);
          const fill = score5 >= 5 ? '#f97316' : score5 >= 4 ? '#fb923c' : score5 >= 3 ? '#f59e0b' : score5 >= 2 ? '#facc15' : '#9ca3af';
          const roundedTemp = city.temp != null ? Math.round(city.temp) : null;
          const roundedFeels = city.feelsLike != null ? Math.round(city.feelsLike) : null;
          let tempLabel = '';
          if (roundedTemp != null && roundedFeels != null) tempLabel = ` • ${roundedTemp}° (ressenti ${roundedFeels}°)`;
          else if (roundedTemp != null) tempLabel = ` • ${roundedTemp}°`;
          else if (roundedFeels != null) tempLabel = ` • ressenti ${roundedFeels}°`;
          const m = L.circleMarker([city.lat, city.lon], {
            radius: radiusPx,
            color: fill,
            fillColor: fill,
            fillOpacity: 0.8,
            weight: 1,
          })
            .addTo(mapInstanceRef.current)
            .bindPopup(`${city.name} — ${score5}/5${tempLabel}`);
          markersRef.current.push(m);
        });
      }, [displayedCities]);

      useEffect(() => {
        if (!selectedCity || !mapInstanceRef.current) return;
        mapInstanceRef.current.setView([selectedCity.lat, selectedCity.lon], 10);
      }, [selectedCity]);

      if (error && !position) {
        return (
          <div className="min-h-screen flex items-center justify-center p-6 bg-sky-50">
            <div className="bg-white rounded-2xl shadow-lg max-w-md w-full p-6 text-center border border-slate-100">
              <div className="flex justify-center text-amber-500 mb-4"><IconAlertCircle /></div>
              <h1 className="text-xl font-semibold text-slate-800 mb-2">SunApp</h1>
              <p className="text-slate-600 mb-4">{error}</p>
              <p className="text-sm text-slate-500">Rechargez la page après avoir autorisé la position.</p>
            </div>
          </div>
        );
      }

      const locationTitle = 'chez vous';
      const destinationLabel = cities.length === 1 ? '1 zone trouvée' : `${cities.length} zones trouvées`;

      return (
        <div className="min-h-screen p-4 md:p-6 bg-sky-50">
          <header className="mb-6">
            <h1 className="text-2xl font-bold text-slate-800 flex items-center gap-2">
              <IconSun className="text-amber-500" /> SunApp
            </h1>
          </header>

          {/* Rayon d'action + carte juste en dessous pour voir l'interaction */}
          <div className="mb-4">
            <div className="bg-white rounded-2xl shadow-md border border-slate-100 p-4">
              <label className="block text-sm font-medium text-slate-700 mb-2">Rayon d'action : ~{formatTravelTime(travelTimeMin)} (≈ {radiusKm} km)</label>
              <input
                type="range"
                min="0"
                max={TRAVEL_TIME_PRESETS_MIN.length - 1}
                step="1"
                value={travelTimeIndex}
                onChange={(e) => setTravelTimeIndex(Number(e.target.value))}
                className="w-full h-2 bg-slate-200 rounded-full appearance-none cursor-pointer"
                style={{ background: `linear-gradient(to right, #36A7EB 0%, #36A7EB ${(travelTimeIndex / (TRAVEL_TIME_PRESETS_MIN.length - 1)) * 100}%, #e2e8f0 ${(travelTimeIndex / (TRAVEL_TIME_PRESETS_MIN.length - 1)) * 100}%, #e2e8f0 100%)` }}
              />
              <div className="flex justify-between text-xs text-slate-500 mt-1">
                <span>15 min</span>
                <span>3 h</span>
              </div>
              <p className="text-xs text-slate-400 mt-0.5">Estimation à vol d'oiseau (≈ 70 km/h). Les isochrones réelles (temps de conduite) nécessiteraient une API dédiée.</p>
            </div>
            <div className="mt-3 bg-white rounded-2xl shadow-md border border-slate-100 overflow-hidden min-h-[220px] h-[260px]" ref={mapRef} id="map" />
          </div>

          <div className="grid grid-cols-1 lg:grid-cols-3 gap-4 mb-6">
            <div className="bg-white rounded-2xl shadow-md border border-slate-100 p-4 lg:col-span-2">
              <label className="block text-sm font-medium text-slate-700 mb-2">Température min. : {minTemp > 0 ? `${minTemp} °C` : 'Aucune'}</label>
              <input
                type="range"
                min="0"
                max="25"
                step="1"
                value={minTemp}
                onChange={(e) => setMinTemp(Number(e.target.value))}
                className="w-full h-2 bg-slate-200 rounded-full appearance-none cursor-pointer"
                style={{ background: `linear-gradient(to right, #36A7EB 0%, #36A7EB ${(minTemp / 25) * 100}%, #e2e8f0 ${(minTemp / 25) * 100}%, #e2e8f0 100%)` }}
              />
              <div className="flex justify-between text-xs text-slate-500 mt-1">
                <span>0 (tous)</span>
                <span>25 °C</span>
              </div>
              <label className="block text-sm font-medium text-slate-700 mt-4 mb-2">Vent max : {maxWindKmh > 0 ? `${maxWindKmh} km/h` : 'Aucune limite'}</label>
              <input
                type="range"
                min="0"
                max="60"
                step="5"
                value={maxWindKmh}
                onChange={(e) => setMaxWindKmh(Number(e.target.value))}
                className="w-full h-2 bg-slate-200 rounded-full appearance-none cursor-pointer"
                style={{ background: `linear-gradient(to right, #36A7EB 0%, #36A7EB ${(maxWindKmh / 60) * 100}%, #e2e8f0 ${(maxWindKmh / 60) * 100}%, #e2e8f0 100%)` }}
              />
              <div className="flex justify-between text-xs text-slate-500 mt-1">
                <span>0 (tous)</span>
                <span>60 km/h</span>
              </div>
              <label className="block text-sm font-medium text-slate-700 mt-4 mb-2">Météo : {WEATHER_LEVEL_LABELS[minWeatherLevel]}</label>
              <input
                type="range"
                min="0"
                max="4"
                step="1"
                value={minWeatherLevel}
                onChange={(e) => setMinWeatherLevel(Number(e.target.value))}
                className="w-full h-2 bg-slate-200 rounded-full appearance-none cursor-pointer"
                style={{ background: `linear-gradient(to right, #36A7EB 0%, #36A7EB ${(minWeatherLevel / 4) * 100}%, #e2e8f0 ${(minWeatherLevel / 4) * 100}%, #e2e8f0 100%)` }}
              />
              <div className="flex justify-between text-xs text-slate-500 mt-1">
                <span>Tout temps</span>
                <span>Soleil uniquement</span>
              </div>
              <button
                type="button"
                onClick={() => runSearch()}
                disabled={loading}
                className="mt-3 w-full flex items-center justify-center gap-2 px-4 py-2 rounded-xl bg-sky-400 text-white hover:bg-sky-500 disabled:opacity-50 text-sm font-medium"
              >
                <IconRefresh /> {loading ? 'Recherche…' : 'Nouvelle recherche'}
              </button>
            </div>
          </div>

          {error && position && (
            <div className="bg-amber-50 border border-amber-200 rounded-2xl p-4 mb-4 flex items-center gap-3 text-amber-800">
              <IconAlertCircle />
              <p>{error}</p>
            </div>
          )}

          {/* Carte principale avec bannière bleue (style maquette) */}
          <div className="bg-white rounded-2xl shadow-lg border border-slate-100 overflow-hidden">
            <div className="bg-[#36A7EB] text-white px-6 py-4 rounded-t-2xl">
              <h2 className="text-lg font-bold">
                {isFallbackMode ? 'Zones météo (aucun point ensoleillé)' : `Zones météo près de ${locationTitle}`}
              </h2>
              <p className="text-sm text-white/90 mt-0.5">
                {loading && position ? 'Recherche en cours…' : cities.length === 0 && !error ? 'Aucun lieu' : (displayedCities.length !== cities.length ? `${destinationLabel} — ${displayedCities.length} affichés` : destinationLabel)}
                {isFallbackMode && cities.length > 0 && ' — triés du moins nuageux au plus proche'}
              </p>
            </div>
            <div className="p-4 md:p-6">
              {loading && position ? (
                <div className="bg-slate-50 rounded-xl py-8">
                  <RadarScanner />
                </div>
              ) : (
                <>
                  {cities.length > 0 && (
                    <label className="flex items-center gap-2 mb-4 text-slate-600 text-sm font-medium">
                      Trier par :
                      <select
                        value={sortBy}
                        onChange={(e) => setSortBy(e.target.value)}
                        className="rounded-lg border border-slate-200 px-3 py-1.5 text-sm bg-white text-slate-800"
                      >
                        <option value="distance">Le plus proche</option>
                        <option value="hottest">Le plus chaud</option>
                        <option value="calm">Le moins de vent</option>
                        <option value="clearest">Ciel le plus pur</option>
                        <option value="sunscore">Le Choix Parfait (WeatherScore)</option>
                      </select>
                    </label>
                  )}
                  <div className="grid grid-cols-1 sm:grid-cols-2 xl:grid-cols-3 gap-4">
                    {displayedCities.map((city, idx) => (
                      <CityCard
                        key={city.id}
                        city={city}
                        userLat={position?.lat}
                        userLon={position?.lon}
                        onShowOnMap={setSelectedCity}
                        isRecommended={sortBy === 'sunscore' && idx === 0}
                      />
                    ))}
                  </div>
                  {!loading && position && cities.length > 0 && displayedCities.length === 0 && (
                    <p className="text-slate-500 text-center py-6">Aucun lieu ne correspond aux filtres.</p>
                  )}
                </>
              )}
              {!loading && position && cities.length === 0 && !error && (
                <p className="text-slate-500 text-center py-8">Aucune zone trouvée. Augmentez le rayon.</p>
              )}
            </div>
          </div>
          <footer className="mt-8 py-4 text-center text-slate-400 text-sm">
            Version {APP_VERSION} • Build {APP_BUILD}
          </footer>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
