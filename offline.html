<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#36A7EB" />
  <title>SunApp - Hors ligne</title>
  <style>
    :root {
      color-scheme: light;
    }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      font-family: "Outfit", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: radial-gradient(circle at top, #e8f4fc 0%, #f8fafc 55%, #f1f5f9 100%);
      color: #0f172a;
      padding: 1rem;
      box-sizing: border-box;
    }
    .panel {
      width: min(460px, 100%);
      background: #ffffff;
      border: 1px solid #dbeafe;
      border-radius: 1rem;
      box-shadow: 0 12px 40px rgba(2, 132, 199, 0.12);
      padding: 1.25rem;
    }
    h1 {
      margin: 0 0 0.5rem;
      font-size: 1.25rem;
    }
    p {
      margin: 0;
      line-height: 1.5;
      color: #334155;
      font-size: 0.95rem;
    }
    .row {
      margin-top: 1rem;
      display: flex;
      gap: 0.6rem;
      flex-wrap: wrap;
    }
    button {
      border: 0;
      border-radius: 0.6rem;
      padding: 0.55rem 0.85rem;
      font: inherit;
      cursor: pointer;
      background: #0ea5e9;
      color: #fff;
      font-weight: 600;
    }
    .ghost {
      background: #e2e8f0;
      color: #1e293b;
    }
  </style>
</head>
<body>
  <main class="panel">
    <h1>SunApp est hors ligne</h1>
    <p>La connexion est indisponible. Les donnees meteo en temps reel ne peuvent pas etre rechargees pour le moment.</p>
    <div class="row">
      <button type="button" onclick="location.reload()">Reessayer</button>
      <button type="button" class="ghost" onclick="history.back()">Retour</button>
    </div>
  </main>
</body>
</html>
